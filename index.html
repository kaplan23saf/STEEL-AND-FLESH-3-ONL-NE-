<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Klanlar - Elazığ Strateji V5</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        #ui-top { position: fixed; top: 0; width: 100%; background: rgba(0,0,0,0.9); padding: 12px; text-align: center; z-index: 1600; border-bottom: 3px solid #2ecc71; }
        #notification-container { position: fixed; top: 10px; right: 10px; width: 280px; z-index: 2000; pointer-events: none; }
        .notif { background: rgba(0,0,0,0.95); border-right: 5px solid #2ecc71; padding: 10px; font-size: 12px; margin-bottom: 5px; border-radius: 4px; border: 1px solid #333; }
        
        #viewport { width: 100vw; height: 100vh; overflow: auto; background: #000; }
        #map { width: 15000px; height: 8000px; position: relative; }
        #map-img { width: 100%; height: 100%; display: block; }

        .building { position: absolute; width: 80px; height: 80px; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; pointer-events: none; }
        .build-icon { font-size: 50px; }
        .build-tag { font-size: 10px; background: rgba(0,0,0,0.8); padding: 2px 5px; border-radius: 4px; border: 1px solid; text-align: center; margin-top: 2px; }
        
        #player { position: absolute; width: 80px; height: 80px; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; cursor: pointer; }
        
        #build-menu { position: fixed; left: 50%; top: 50%; transform: translate(-50%, -50%); background: #111; border: 3px solid #2ecc71; padding: 30px; z-index: 2500; display: none; border-radius: 20px; }
        .build-btn { display: block; width: 200px; padding: 15px; margin: 10px; background: #222; border: 1px solid #2ecc71; color: #fff; cursor: pointer; font-weight: bold; border-radius: 10px; }
        
        #login { position: fixed; inset: 0; background: #000; z-index: 3000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        input, select { padding: 15px; border: 2px solid #2ecc71; background: #111; color: white; border-radius: 10px; width: 280px; margin-bottom: 15px; font-size: 16px; }
        button#start-btn { padding: 15px 60px; background: #2ecc71; color: #000; border: none; font-weight: bold; border-radius: 10px; cursor: pointer; font-size: 18px; }
        canvas { display: none; }
    </style>
</head>
<body>

<canvas id="mapCanvas"></canvas>
<div id="notification-container"></div>
<div id="ui-top">
    <span id="move-timer" style="font-weight:bold; color:#2ecc71;">HAREKET: HAZIR</span>
    <span id="build-status" style="margin-left:20px; color:#f1c40f;"></span>
</div>

<div id="build-menu">
    <h2 style="color:#2ecc71; margin-top:0;">İNŞAAT SEÇ</h2>
    <button class="build-btn" onclick="startBuild('Köy', '🏡', 15)">🏡 KÖY (15s)</button>
    <button class="build-btn" onclick="startBuild('Kale', '🏰', 30)">🏰 KALE (30s)</button>
    <button onclick="document.getElementById('build-menu').style.display='none'" style="color:#666; background:none; border:none; cursor:pointer;">VAZGEÇ</button>
</div>

<div id="login">
    <h1 style="color:#2ecc71;">ELAZIĞ OPERASYONU</h1>
    <input type="text" id="pName" placeholder="KOMUTAN ADI">
    <select id="pKlan">
        <option value="AVAR" data-color="#2ecc71">AVAR KLANLI</option>
        <option value="D.A.İ" data-color="#9b59b6">D.A.İ KLANLI</option>
        <option value="SPARTA" data-color="#e74c3c">SPARTA KLANLI</option>
        <option value="VAMPİRE" data-color="#556b2f">VAMPİRE KLANLI</option>
    </select>
    <button id="start-btn" onclick="basla()">SEFERİ BAŞLAT</button>
</div>

<div id="viewport">
    <div id="map">
        <img id="map-img" src="https://upload.wikimedia.org/wikipedia/commons/e/ec/World_map_blank_without_borders.svg" crossorigin="anonymous">
        <div id="player" style="display:none;" onclick="openBuildMenu()">
            <div style="color:#f1c40f; font-size:20px;">▼</div>
            <span id="pIcon" style="font-size:50px;">🏇</span>
            <span id="nameTag" style="font-size:12px; padding:3px 8px; border-radius:5px; font-weight:bold; color:white;"></span>
        </div>
    </div>
</div>

    const canvas = document.getElementById('mapCanvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const mapImg = document.getElementById('map-img');

    function basla() {
        const nameInput = document.getElementById('pName').value.trim();
        const klanSelect = document.getElementById('pKlan');
        
        if(!nameInput) return alert("Komutan, bir isim girmelisin!");
        
        myName = nameInput;
        myKlan = klanSelect.value;
        myColor = klanSelect.options[klanSelect.selectedIndex].dataset.color;

        document.getElementById('login').style.display = 'none';
        document.getElementById('player').style.display = 'flex';
        document.getElementById('nameTag').innerText = `[${myKlan}] ${myName}`;
        document.getElementById('nameTag').style.background = myColor;

        canvas.width = 1500; canvas.height = 800;
        ctx.drawImage(mapImg, 0, 0, 1500, 800);
        
        updateUnit();
        initSystems();
    }

    function checkIsSea(cx, cy) {
        const pix = ctx.getImageData((cx * SIZE / 15000) * 1500, (cy * SIZE / 8000) * 800, 1, 1).data;
        return (pix[0] < 150 && pix[1] < 150 && pix[2] < 150);
    }

    function openBuildMenu() {
        if (Date.now() < buildEndTime) return;
        document.getElementById('build-menu').style.display = 'block';
    }

            const dx = Math.abs(Math.floor(s.x) - Math.floor(x));
            const dy = Math.abs(Math.floor(s.y) - Math.floor(y));
            return (dx === 0 && dy === 0) ? false : (dx < 5 && dy < 5);
        });

        if(tooClose) return addNotification("⚠️ Yakında başka yapı var! (5 kare mesafe)", "orange");

        if(!bName) return;

            owner_name: saveStr,
            type: '🏗️',
            x: Math.floor(x),
            y: Math.floor(y)

        if(data && data[0]) {
            addNotification(`🏗️ ${bName} inşaatı başladı...`, "cyan");

                await supabaseClient.from('structures').update({ type: finalIcon }).eq('id', data[0].id);
                addNotification(`✅ ${bName} tamamlandı!`, "#2ecc71");
                loadData();
            }, duration * 1000);
        }
    }

        const b = document.createElement('div');
        b.className = 'building local-temp';
        b.style.left = (lx * SIZE) + "px"; b.style.top = (ly * SIZE) + "px";
        b.innerHTML = `<span class="build-icon">${icon}</span><span class="build-tag" style="color:${myColor}; border-color:${myColor}">${myName}<br><b>${title}</b></span>`;
        document.getElementById('map').appendChild(b);
    }

        const vp = document.getElementById('viewport');

    }
