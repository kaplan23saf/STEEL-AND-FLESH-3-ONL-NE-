<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Savaş Odası - Klanlar</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        
        /* Giriş Paneli */
        #login { position: fixed; inset: 0; background: #000; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        input, select { padding: 12px; border: 2px solid #2ecc71; background: #111; color: white; margin-bottom: 10px; width: 250px; border-radius: 8px; }
        button { padding: 12px 40px; background: #2ecc71; color: #000; border: none; font-weight: bold; cursor: pointer; border-radius: 8px; }

        /* Sol Üst Klan Listesi (Çerçevesiz ve Şeffaf) */
        #klan-listesi { 
            position: fixed; left: 15px; top: 15px; z-index: 40; 
            pointer-events: none; text-shadow: 2px 2px 4px #000;
        }
        .klan-item { font-weight: bold; font-size: 14px; margin-bottom: 5px; letter-spacing: 1px; }

        /* Arayüz */
        #ui { position: fixed; top: 0; width: 100%; background: rgba(0,0,0,0.7); padding: 10px; text-align: center; z-index: 50; border-bottom: 1px solid rgba(46, 204, 113, 0.3); }
        #timer { font-size: 18px; font-weight: bold; }

        /* Harita */
        #viewport { width: 100vw; height: 100vh; overflow: auto; background: #000; }
        #map { width: 15000px; height: 8000px; position: relative; }
        #map-img { width: 100%; height: 100%; display: block; }
        
        /* Karakter */
        .unit { position: absolute; width: 60px; height: 60px; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; transition: all 0.5s; }
        .unit-icon { font-size: 45px; filter: drop-shadow(0 0 10px gold); }
        .unit-name { font-size: 12px; padding: 2px 8px; border-radius: 4px; white-space: nowrap; font-weight: bold; margin-top: 5px; color: #fff; }

        canvas { display: none; }
    </style>
</head>
<body>

<canvas id="mapCanvas"></canvas>

<div id="klan-listesi">
    <div class="klan-item" style="color: #2ecc71;">AVAR</div>
    <div class="klan-item" style="color: #9b59b6;">DEVLET-İ ALİYYE-İ İSLAM</div>
    <div class="klan-item" style="color: #e74c3c;">SPARTA</div>
    <div class="klan-item" style="color: #556b2f;">VAMPİRE EMPİRE</div>
    <div class="klan-item" style="color: #ffc0cb;">NOR</div>
    <div class="klan-item" style="color: #ff0000;">CRM</div>
</div>

<div id="login">
    <h1 style="color:#2ecc71;">KLANLAR SAVAŞI</h1>
    <input type="text" id="pName" placeholder="Komutan İsmi">
    <select id="pKlan">
        <option value="">Klan Seçin...</option>
        <option value="AVAR" data-color="#2ecc71">AVAR</option>
        <option value="DEVLET-İ ALİYYE-İ İSLAM" data-color="#9b59b6">DEVLET-İ ALİYYE-İ İSLAM</option>
        <option value="SPARTA" data-color="#e74c3c">SPARTA</option>
        <option value="VAMPİRE EMPİRE" data-color="#556b2f">VAMPİRE EMPİRE</option>
        <option value="NOR" data-color="#ffc0cb">NOR</option>
        <option value="CRM" data-color="#ff0000">CRM</option>
    </select>
    <button onclick="basla()">SEFERE ÇIK</button>
</div>

<div id="ui">
    <div id="timer">HAZIR</div>
</div>

<div id="viewport">
    <div id="map">
        <img id="map-img" src="https://upload.wikimedia.org/wikipedia/commons/e/ec/World_map_blank_without_borders.svg" crossorigin="anonymous">
        <div id="player" class="unit" style="display:none;">
            <span id="pIcon" class="unit-icon">🏇</span>
            <span id="nameTag" class="unit-name"></span>
        </div>
    </div>
</div>

<script>
    const adminName = "Lord"; // Bu ismi yazarsan sayı yasağı kalkar
    let x = 0, y = 0;
    const SIZE = 80;
    let lastMoveTime = 0;
    let currentCooldown = 5000;
    
    const canvas = document.getElementById('mapCanvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const mapImg = document.getElementById('map-img');

    function basla() {
        const nameInput = document.getElementById('pName').value.trim();
        const klanSelect = document.getElementById('pKlan');
        const kColor = klanSelect.options[klanSelect.selectedIndex].dataset.color;

        if(!nameInput || !klanSelect.value) return alert("İsim ve Klan seçiniz!");
        if(nameInput !== adminName && /\d/.test(nameInput)) return alert("Sayı yasak!");

        // Harita verisini işle
        canvas.width = 1500; canvas.height = 800;
        ctx.drawImage(mapImg, 0, 0, 1500, 800);

        // RASTGELE BEYAZ BÖLGEDE BAŞLAT
        findSafeStart();

        document.getElementById('nameTag').innerText = nameInput;
        document.getElementById('nameTag').style.backgroundColor = kColor;
        document.getElementById('login').style.display = 'none';
        document.getElementById('player').style.display = 'flex';
        
        updateUnit();
        document.getElementById('player').scrollIntoView({ block: 'center', inline: 'center' });
    }

    function isSea(checkX, checkY) {
        const sampleX = (checkX * SIZE / 15000) * 1500;
        const sampleY = (checkY * SIZE / 8000) * 800;
        const p = ctx.getImageData(sampleX, sampleY, 1, 1).data;
        // Eğer renk siyah/koyu ise denizdir (Parlaklık kontrolü)
        return (p[0] < 150 && p[1] < 150 && p[2] < 150);
    }

    function findSafeStart() {
        let found = false;
        while(!found) {
            let rx = Math.floor(Math.random() * 180);
            let ry = Math.floor(Math.random() * 90);
            if(!isSea(rx, ry)) {
                x = rx; y = ry;
                found = true;
            }
        }
    }

    function updateUnit() {
        const p = document.getElementById('player');
        const icon = document.getElementById('pIcon');
        const inSea = isSea(x, y);

        if(inSea) {
            icon.innerText = "🚢";
            currentCooldown = 10000;
        } else {
            icon.innerText = "🏇";
            currentCooldown = 5000;
        }

        p.style.left = (x * SIZE) + "px";
        p.style.top = (y * SIZE) + "px";
    }

    document.getElementById('map').onclick = function(e) {
        const now = Date.now();
        if (now - lastMoveTime < currentCooldown) return;

        const tx = Math.floor(e.offsetX / SIZE);
        const ty = Math.floor(e.offsetY / SIZE);

        if (Math.abs(tx - x) + Math.abs(ty - y) === 1) {
            x = tx; y = ty;
            lastMoveTime = now;
            updateUnit();
        }
    };

    setInterval(() => {
        const diff = Date.now() - lastMoveTime;
        const timerDiv = document.getElementById('timer');
        if (diff < currentCooldown) {
            timerDiv.innerText = "İNTİKAL: " + Math.ceil((currentCooldown - diff) / 1000) + "s";
            timerDiv.style.color = "#ff4757";
        } else {
            timerDiv.innerText = "HAREKETE HAZIR";
            timerDiv.style.color = "#2ecc71";
        }
    }, 500);
</script>

</body>
</html>
