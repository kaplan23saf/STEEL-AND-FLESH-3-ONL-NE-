<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Klanlar - Elazığ Cephesi</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Segoe UI', Tahoma, sans-serif; overflow: hidden; }
        
        /* KENAR TAKİP OKU */
        #edge-tracker {
            position: fixed; width: 0; height: 0; 
            border-left: 12px solid transparent; border-right: 12px solid transparent;
            border-bottom: 25px solid #2ecc71; /* Yeşil Ok */
            z-index: 1000; display: none; pointer-events: none;
            filter: drop-shadow(0 0 5px #2ecc71);
        }

        #notification-container {
            position: fixed; top: 10px; right: 10px; width: 240px; z-index: 999;
            display: flex; flex-direction: column; gap: 5px; pointer-events: none;
        }
        .notif {
            background: rgba(0, 0, 0, 0.85); border-right: 4px solid #2ecc71;
            padding: 8px 12px; font-size: 11px; border-radius: 4px;
            animation: slideIn 0.3s ease, fadeOut 0.5s 4.5s forwards;
        }

        #ui-top {
            position: fixed; top: 0; width: 100%; background: rgba(0,0,0,0.8);
            padding: 10px; text-align: center; z-index: 500; border-bottom: 1px solid #2ecc71;
        }

        #build-menu { 
            position: fixed; left: 50%; top: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.95); border: 2px solid #2ecc71; padding: 20px;
            z-index: 1100; display: none; border-radius: 15px; text-align: center;
        }
        .build-btn { display: block; width: 220px; padding: 12px; margin: 8px; background: #222; border: 1px solid #2ecc71; color: #fff; cursor: pointer; border-radius: 8px; font-weight: bold; }

        #viewport { width: 100vw; height: 100vh; overflow: auto; background: #000; scroll-behavior: smooth; }
        #map { width: 15000px; height: 8000px; position: relative; }
        #map-img { width: 100%; height: 100%; display: block; }
        
        #player { position: absolute; width: 80px; height: 80px; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; transition: all 0.5s; cursor: pointer; }
        .arrow-indicator { position: absolute; top: -35px; font-size: 25px; color: #f1c40f; animation: bounce 0.8s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }

        /* pointer-events: none eklendi ki yapının olduğu kareye tıklayıp yürünebilsin */
        .building { position: absolute; width: 100px; height: 100px; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; pointer-events: none; }
        .build-icon { font-size: 45px; filter: drop-shadow(0 0 10px rgba(0,0,0,1)); }
        .build-owner-tag { font-size: 11px; background: rgba(0,0,0,0.8); padding: 2px 6px; border-radius: 4px; white-space: nowrap; margin-top: 4px; text-align: center; border: 1px solid rgba(255,255,255,0.1); }

        #login { position: fixed; inset: 0; background: #000; z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        input, select { padding: 12px; border: 2px solid #2ecc71; background: #111; color: white; margin-bottom: 10px; width: 250px; border-radius: 8px; }
        button#start-btn { padding: 12px 40px; background: #2ecc71; color: #000; border: none; font-weight: bold; cursor: pointer; border-radius: 8px; }

        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
        @keyframes fadeOut { to { opacity: 0; } }
        canvas { display: none; }
    </style>
</head>
<body>

<div id="edge-tracker"></div>
<canvas id="mapCanvas"></canvas>
<div id="notification-container"></div>

<div id="ui-top">
    <span id="move-timer" style="font-weight:bold; color:#2ecc71;">HAREKET: HAZIR</span>
    <span id="build-status" style="margin-left:20px; color:#f1c40f; font-weight:bold;"></span>
</div>

<div id="build-menu">
    <h3 style="color:#2ecc71; margin-top:0;">YAPI İNŞA ET</h3>
    <button class="build-btn" onclick="startBuild('Köy', '🏡', 15)">Köy (15s)</button>
    <button class="build-btn" onclick="startBuild('Kale', '🏰', 30)">Kale (30s)</button>
    <button class="build-btn" onclick="startBuild('Şehir', '🏙️', 45)">Şehir (45s)</button>
    <button onclick="document.getElementById('build-menu').style.display='none'" style="margin-top:10px; background:#c0392b; color:#fff; border:none; padding:8px 20px; border-radius:5px; cursor:pointer;">İPTAL</button>
</div>

<div id="login">
    <h1 style="color: #2ecc71; letter-spacing: 2px;">ELAZIĞ STRATEJİ</h1>
    <input type="text" id="pName" placeholder="Karakter İsmi">
    <select id="pKlan">
        <option value="AVAR" data-color="#2ecc71">AVAR</option>
        <option value="D.A.İ" data-color="#9b59b6">D.A.İ</option>
        <option value="SPARTA" data-color="#e74c3c">SPARTA</option>
        <option value="VAMPİRE" data-color="#556b2f">VAMPİRE</option>
        <option value="NOR" data-color="#ffc0cb">NOR</option>
        <option value="CRM" data-color="#ff0000">CRM</option>
    </select>
    <button id="start-btn" onclick="basla()">SAVAŞA GİR</button>
</div>

<div id="viewport">
    <div id="map">
        <img id="map-img" src="https://upload.wikimedia.org/wikipedia/commons/e/ec/World_map_blank_without_borders.svg" crossorigin="anonymous">
        <div id="player" style="display:none;" onclick="openBuildMenu()">
            <div class="arrow-indicator">▼</div>
            <span id="pIcon" style="font-size:45px;">🏇</span>
            <span id="nameTag" style="font-size:12px; padding:2px 8px; border-radius:4px; font-weight:bold; margin-top:5px;"></span>
        </div>
    </div>
</div>

<script>
    const supabaseClient = window.supabase.createClient("https://nfyqinmktmmdurklsred.supabase.co", "Sb_publishable_M6G0bwXo3kkFf9wGY9xz_A_DlDWrvm8");

    let x = 0, y = 0;
    const SIZE = 80;
    let lastMoveTime = 0;
    let buildEndTime = 0;
    let structures = []; 
    let myId = localStorage.getItem('playerId') || Math.random().toString(36).substr(2, 9);
    localStorage.setItem('playerId', myId);
    let myColor, myKlan, myName;

    const canvas = document.getElementById('mapCanvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const mapImg = document.getElementById('map-img');

    function basla() {
        myName = document.getElementById('pName').value.trim();
        const kSelect = document.getElementById('pKlan');
        myColor = kSelect.options[kSelect.selectedIndex].dataset.color;
        myKlan = kSelect.value;
        if(!myName) return alert("Komutan, bir isim girmelisiniz!");

        canvas.width = 1500; canvas.height = 800;
        ctx.drawImage(mapImg, 0, 0, 1500, 800);

        // Güvenli başlangıç noktası (Kara bulana kadar)
        while(true) {
            let rx = Math.floor(Math.random() * 120) + 30;
            let ry = Math.floor(Math.random() * 60) + 20;
            const pix = ctx.getImageData((rx * SIZE / 15000) * 1500, (ry * SIZE / 8000) * 800, 1, 1).data;
            if(!(pix[0] < 150 && pix[1] < 150 && pix[2] < 150)) { x = rx; y = ry; break; }
        }

        document.getElementById('login').style.display = 'none';
        document.getElementById('player').style.display = 'flex';
        document.getElementById('nameTag').innerText = myName;
        document.getElementById('nameTag').style.backgroundColor = myColor;
        
        updateUnit();
        focusPlayer();
        initMultiplayer();
        requestAnimationFrame(updateEdgeTracker); // Kenar oku döngüsünü başlat
    }

    function focusPlayer() {
        const vp = document.getElementById('viewport');
        vp.scrollTo((x * SIZE) - (window.innerWidth / 2), (y * SIZE) - (window.innerHeight / 2));
    }

    // KENAR TAKİP OKU MANTIĞI
    function updateEdgeTracker() {
        const p = document.getElementById('player');
        const tracker = document.getElementById('edge-tracker');
        const rect = p.getBoundingClientRect();
        
        const isOffScreen = rect.left < 0 || rect.right > window.innerWidth || rect.top < 0 || rect.bottom > window.innerHeight;

        if (isOffScreen) {
            tracker.style.display = 'block';
            let tx = Math.min(Math.max(rect.left + 40, 20), window.innerWidth - 40);
            let ty = Math.min(Math.max(rect.top + 40, 80), window.innerHeight - 40);
            
            tracker.style.left = tx + 'px';
            tracker.style.top = ty + 'px';

            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;
            const angle = Math.atan2((rect.top + 40) - ty, (rect.left + 40) - tx);
            tracker.style.transform = `rotate(${angle * (180 / Math.PI) - 90}deg)`;
        } else {
            tracker.style.display = 'none';
        }
        requestAnimationFrame(updateEdgeTracker);
    }

    function openBuildMenu() {
        if (Date.now() < buildEndTime) return;
        document.getElementById('build-menu').style.display = 'block';
    }

    async function startBuild(typeLabel, icon, duration) {
        // Mesafe Kontrolü (5 Birim)
        const tooClose = structures.some(s => Math.sqrt(Math.pow(s.x - x, 2) + Math.pow(s.y - y, 2)) < 5);
        if(tooClose) {
            addNotification("⚠️ Çok Yakın! Diğer yapılardan en az 5 kare uzaklaşın.", "#e74c3c");
            document.getElementById('build-menu').style.display = 'none';
            return;
        }

        const bName = prompt(`${typeLabel} için bir isim verin:`);
        if(!bName) return;

        buildEndTime = Date.now() + (duration * 1000);
        document.getElementById('build-menu').style.display = 'none';

        // Veritabanı Kayıt Formatı: İsim||Renk||YapıAdı
        const saveString = `${myName}||${myColor}||${bName}`;
        broadcastLog(`[${myKlan}] ${myName}, ${x},${y} koordinatlarında bir <b>${typeLabel}</b> inşa ediyor... 🏗️`, myColor);

        // ÖNCE İNŞAAT SİMGESİYLE KAYDET (🏗️)
        const { data, error } = await supabaseClient.from('structures').insert({ owner_name: saveString, type: '🏗️', x: x, y: y }).select();
        
        if(data && data[0]) {
            const buildId = data[0].id;
            loadWorldData(); // İnşaat başladığı an 🏗️ simgesini haritada hemen göster

            setTimeout(async () => {
                // SÜRE BİTİNCE GERÇEK SEMBOLE ÇEVİR (Kalıcı yapı)
                await supabaseClient.from('structures').update({ type: icon }).eq('id', buildId);
                broadcastLog(`[${myKlan}] ${myName}, ${x},${y} koordinatlarında <b>${bName}</b> yapısını bitirdi! ${icon}`, myColor);
                loadWorldData(); // Gerçek yapıyı haritada hemen göster
            }, duration * 1000);
        }
    }

    function updateUnit() {
        const p = document.getElementById('player');
        p.style.left = (x * SIZE) + "px";
        p.style.top = (y * SIZE) + "px";
        
        const pix = ctx.getImageData((x * SIZE / 15000) * 1500, (y * SIZE / 8000) * 800, 1, 1).data;
        const isSea = (pix[0] < 150 && pix[1] < 150 && pix[2] < 150);
        document.getElementById('pIcon').innerText = isSea ? "🚢" : "🏇";

        supabaseClient.from('players').upsert({ id: myId, name: myName, klan: myKlan, color: myColor, x: x, y: y, last_seen: new Date().toISOString() }).then();
    }

    document.getElementById('map').onclick = function(e) {
        if(e.target.id !== 'map-img') return;
        const tx = Math.floor(e.offsetX / SIZE);
        const ty = Math.floor(e.offsetY / SIZE);
        const dist = Math.abs(tx - x) + Math.abs(ty - y);

        if(dist === 1) {
            const now = Date.now();
            const cd = document.getElementById('pIcon').innerText === "🚢" ? 10000 : 5000;
            if(now - lastMoveTime < cd) return;
            x = tx; y = ty; lastMoveTime = now;
            updateUnit();
        } else if(dist > 1) {
            addNotification("⚠️ Hedef Uzak! Adım adım ilerlemelisin.", "#e74c3c");
        }
    };

    // SAYAÇLAR
    setInterval(() => {
        const now = Date.now();
        const mTimer = document.getElementById('move-timer');
        const bStatus = document.getElementById('build-status');
        const cd = document.getElementById('pIcon').innerText === "🚢" ? 10000 : 5000;
        const diff = now - lastMoveTime;

        if(diff < cd) {
            mTimer.innerText = `HAREKET: ${Math.ceil((cd-diff)/1000)}s`;
            mTimer.style.color = "#e74c3c";
        } else {
            mTimer.innerText = "HAREKET: HAZIR";
            mTimer.style.color = "#2ecc71";
        }

        if(now < buildEndTime) {
            bStatus.innerText = `| İNŞAAT: ${Math.ceil((buildEndTime-now)/1000)}s`;
        } else { bStatus.innerText = ""; }
    }, 500);

    function addNotification(msg, color) {
        const container = document.getElementById('notification-container');
        const n = document.createElement('div');
        n.className = 'notif';
        n.style.borderRightColor = color;
        n.innerHTML = msg;
        container.appendChild(n);
        setTimeout(() => n.remove(), 5000);
    }

    function broadcastLog(msg, color) {
        addNotification(msg, color);
        supabaseClient.channel('world-logs').send({ type: 'broadcast', event: 'new_log', payload: { msg, color } });
    }

    async function initMultiplayer() {
        supabaseClient.channel('world-logs').on('broadcast', { event: 'new_log' }, (p) => addNotification(p.payload.msg, p.payload.color)).subscribe();
        loadWorldData();
        setInterval(loadWorldData, 5000);
    }

    async function loadWorldData() {
        const { data: dbStructures } = await supabaseClient.from('structures').select('*');
        const { data: dbPlayers } = await supabaseClient.from('players').select('*');
        const mapDiv = document.getElementById('map');
        
        Array.from(mapDiv.children).forEach(c => { if(c.id !== 'map-img' && c.id !== 'player') c.remove(); });
        structures = []; 

        if(dbStructures) {
            dbStructures.forEach(s => {
                let p = s.owner_name.split("||");
                const b = document.createElement('div');
                b.className = 'building';
                b.style.left = (s.x * SIZE) + "px"; b.style.top = (s.y * SIZE) + "px";
                
                // Sembol ve İsim Render
                b.innerHTML = `
                    <span class="build-icon">${s.type}</span>
                    <span class="build-owner-tag" style="color:${p[1]}; border-color:${p[1]}">
                        ${p[0]}<br><b>${p[2]||''}</b>
                    </span>
                `;
                mapDiv.appendChild(b);
                structures.push({x: s.x, y: s.y});
            });
        }

        if(dbPlayers) {
            dbPlayers.forEach(p => {
                if(p.id === myId || Date.now() - new Date(p.last_seen).getTime() > 300000) return; 
                const u = document.createElement('div');
                u.className = 'unit';
                u.style.left = (p.x * SIZE) + "px"; u.style.top = (p.y * SIZE) + "px";
                u.innerHTML = `<span style="font-size:40px;">🏇</span><span style="background:${p.color}; font-size:10px; padding:2px 5px; border-radius:3px; font-weight:bold;">${p.name}</span>`;
                mapDiv.appendChild(u);
            });
        }
    }
</script>
</body>
</html>
