<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Yüksek Çözünürlüklü Savaş Haritası</title>
    <style>
        body { margin: 0; background: #000b1a; color: #2ecc71; font-family: sans-serif; overflow: hidden; }
        
        /* Giriş Paneli */
        #login { position: fixed; inset: 0; background: #000; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        input { padding: 12px; border: 2px solid #2ecc71; background: #111; color: white; margin-bottom: 10px; width: 220px; text-align: center; border-radius: 8px; }
        button { padding: 10px 25px; background: #2ecc71; color: #000; border: none; font-weight: bold; cursor: pointer; border-radius: 8px; }

        /* Arayüz */
        #ui { position: fixed; top: 0; width: 100%; background: rgba(0,0,0,0.9); padding: 8px; text-align: center; border-bottom: 1px solid #2ecc71; z-index: 50; pointer-events: none; }
        #timer { font-size: 16px; font-weight: bold; color: #ff4757; }

        /* Harita Alanı */
        #viewport { width: 100vw; height: 100vh; overflow: auto; background: #000; touch-action: pan-x pan-y; }
        
        #map { 
            /* Haritayı devasa tutuyoruz (25.000 piksel), böylece küçük adımlarla çok yolun olur */
            width: 25000px; 
            height: 15000px; 
            background-image: url('https://upload.wikimedia.org/wikipedia/commons/e/ec/World_map_blank_without_borders.svg'); 
            background-size: cover;
            position: relative;
        }

        /* Oyuncu İkonu (Küçük karelere uygun boyuta çekildi) */
        .unit { 
            position: absolute; 
            width: 40px; height: 40px; /* Atı biraz küçülttük ki küçük karelere sığsın */
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            z-index: 10;
            transition: all 0.4s ease-out;
        }
        .unit-icon { font-size: 30px; filter: drop-shadow(0 0 5px gold); }
        .unit-name { font-size: 10px; background: rgba(0,0,0,0.8); color: #fff; padding: 1px 4px; border: 1px solid #2ecc71; border-radius: 3px; white-space: nowrap; }

        /* Yeşil Takip Oku */
        #tracker-arrow {
            position: fixed; width: 0; height: 0;
            border-left: 8px solid transparent; border-right: 8px solid transparent;
            border-bottom: 20px solid #2ecc71; z-index: 60; display: none;
            filter: drop-shadow(0 0 5px #2ecc71); pointer-events: none;
        }
    </style>
</head>
<body>

<div id="tracker-arrow"></div>

<div id="login">
    <h1 style="color:#2ecc71;">MİKRO STRATEJİ</h1>
    <input type="text" id="pName" placeholder="İsim (Sayı Yasak)" oninput="this.value = this.value.replace(/[0-9]/g, '')">
    <button onclick="basla()">ORDUYU YÖNET</button>
</div>

<div id="ui">
    <div id="timer">HAZIR</div>
    <div id="coords" style="font-size: 10px; color: #888;">Hassas Konum: --, --</div>
</div>

<div id="viewport">
    <div id="map">
        <div id="player" class="unit" style="display:none;">
            <span class="unit-icon">🏇</span>
            <span id="nameTag" class="unit-name"></span>
        </div>
    </div>
</div>

<script>
    /* YENİ ÖLÇEK: 
       SIZE = 40 piksel. 
       Ekran yüksekliği ortalama 800-900 piksel desek, 
       900 / 40 = Yaklaşık 22 kare ekrana sığar. 
       Tam istediğin gibi!
    */
    let x = 300, y = 150; 
    const SIZE = 40; 
    let lastMoveTime = 0;
    const cooldown = 5000;

    const viewport = document.getElementById('viewport');
    const player = document.getElementById('player');
    const arrow = document.getElementById('tracker-arrow');

    function basla() {
        const name = document.getElementById('pName').value.trim();
        if(name.length < 2) return alert("İsim girin!");
        document.getElementById('nameTag').innerText = name;
        document.getElementById('login').style.display = 'none';
        player.style.display = 'flex';
        render(true);
        requestAnimationFrame(updateArrow);
    }

    function render(center = false) {
        player.style.left = (x * SIZE) + "px";
        player.style.top = (y * SIZE) + "px";
        document.getElementById('coords').innerText = `X: ${x}, Y: ${y}`;
        
        if(center) {
            player.scrollIntoView({ behavior: 'smooth', block: 'center', inline: 'center' });
        }
    }

    function updateArrow() {
        const pRect = player.getBoundingClientRect();
        const vWidth = window.innerWidth;
        const vHeight = window.innerHeight;

        if (pRect.left >= 0 && pRect.right <= vWidth && pRect.top >= 0 && pRect.bottom <= vHeight) {
            arrow.style.display = 'none';
        } else {
            arrow.style.display = 'block';
            let arrowX = Math.min(Math.max(pRect.left + 20, 15), vWidth - 30);
            let arrowY = Math.min(Math.max(pRect.top + 20, 60), vHeight - 30);
            arrow.style.left = arrowX + "px";
            arrow.style.top = arrowY + "px";

            const angle = Math.atan2((pRect.top + 20) - arrowY, (pRect.left + 20) - arrowX);
            arrow.style.transform = `rotate(${angle * (180 / Math.PI) - 90}deg)`;
        }
        requestAnimationFrame(updateArrow);
    }

    setInterval(() => {
        const now = Date.now();
        const diff = now - lastMoveTime;
        const timerDiv = document.getElementById('timer');
        if (diff < cooldown) {
            timerDiv.innerText = "İNTİKAL: " + Math.ceil((cooldown - diff) / 1000) + "s";
        } else {
            timerDiv.innerText = "HAREKETE HAZIR";
        }
    }, 500);

    document.getElementById('map').onclick = function(e) {
        const now = Date.now();
        if (now - lastMoveTime < cooldown) return;

        const tx = Math.floor(e.offsetX / SIZE);
        const ty = Math.floor(e.offsetY / SIZE);

        const dist = Math.abs(tx - x) + Math.abs(ty - y);
        if (dist === 1) {
            x = tx; y = ty;
            lastMoveTime = now;
            render(false);
        }
    };
</script>

</body>
</html>
