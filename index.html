<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Klanlar - Elazığ Strateji</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        /* SOL KLAN LİSTESİ */
        #clan-list {
            position: fixed; left: 10px; top: 60px; width: 120px;
            background: rgba(0, 0, 0, 0.6); padding: 10px; border-radius: 8px;
            border-left: 3px solid #2ecc71; z-index: 100; font-size: 12px;
        }
        .clan-item { margin-bottom: 5px; font-weight: bold; }

        /* BİLDİRİMLER (SAĞ ÜST) */
        #notification-container {
            position: fixed; top: 10px; right: 10px; width: 220px; z-index: 999;
            display: flex; flex-direction: column; gap: 5px; pointer-events: none;
        }
        .notif {
            background: rgba(0, 0, 0, 0.8); border-right: 4px solid #2ecc71;
            padding: 8px 12px; font-size: 11px; border-radius: 4px;
            animation: slideIn 0.3s ease, fadeOut 0.5s 4.5s forwards;
        }

        /* YÖN OKU */
        .arrow {
            position: absolute; top: -30px; left: 50%; transform: translateX(-50%);
            font-size: 20px; color: #f1c40f; animation: bounce 1s infinite;
        }
        @keyframes bounce { 0%, 100% { transform: translate(-50%, 0); } 50% { transform: translate(-50%, -10px); } }

        #viewport { width: 100vw; height: 100vh; overflow: auto; background: #000; scroll-behavior: smooth; }
        #map { width: 15000px; height: 8000px; position: relative; }
        #map-img { width: 100%; height: 100%; display: block; }

        .unit { position: absolute; width: 80px; height: 80px; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; transition: all 0.5s; }
        .unit-name { font-size: 12px; padding: 2px 8px; border-radius: 4px; white-space: nowrap; font-weight: bold; margin-top: 5px; }

        #login { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        input, select { padding: 12px; border: 2px solid #2ecc71; background: #111; color: white; margin-bottom: 10px; width: 250px; }
        button { padding: 12px 40px; background: #2ecc71; color: #000; border: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="notification-container"></div>

<div id="clan-list">
    <div style="color: #2ecc71; margin-bottom: 10px; border-bottom: 1px solid #333;">KLANLAR</div>
    <div class="clan-item" style="color: #2ecc71;">AVAR</div>
    <div class="clan-item" style="color: #9b59b6;">D.A.İ</div>
    <div class="clan-item" style="color: #e74c3c;">SPARTA</div>
    <div class="clan-item" style="color: #556b2f;">VAMPİRE</div>
    <div class="clan-item" style="color: #ffc0cb;">NOR</div>
    <div class="clan-item" style="color: #ff0000;">CRM</div>
</div>

<div id="login">
    <h1>ELAZIĞ STRATEJİ</h1>
    <input type="text" id="pName" placeholder="Oyuncu İsmi">
    <select id="pKlan">
        <option value="AVAR" data-color="#2ecc71">AVAR</option>
        <option value="D.A.İ" data-color="#9b59b6">D.A.İ</option>
        <option value="SPARTA" data-color="#e74c3c">SPARTA</option>
        <option value="VAMPİRE" data-color="#556b2f">VAMPİRE</option>
        <option value="NOR" data-color="#ffc0cb">NOR</option>
        <option value="CRM" data-color="#ff0000">CRM</option>
    </select>
    <button onclick="basla()">BAŞLA</button>
</div>

<div id="viewport">
    <div id="map">
        <img id="map-img" src="https://upload.wikimedia.org/wikipedia/commons/e/ec/World_map_blank_without_borders.svg">
        <div id="player" class="unit" style="display:none;">
            <div class="arrow">▼</div> <span id="pIcon" style="font-size:40px;">🏇</span>
            <span id="nameTag" class="unit-name"></span>
        </div>
    </div>
</div>

<script>
    const supabaseClient = window.supabase.createClient("https://nfyqinmktmmdurklsred.supabase.co", "Sb_publishable_M6G0bwXo3kkFf9wGY9xz_A_DlDWrvm8");
    
    let x = 0, y = 0;
    const SIZE = 80;
    let myId = localStorage.getItem('playerId') || Math.random().toString(36).substr(2, 9);
    let myColor, myKlan, myName;

    function basla() {
        myName = document.getElementById('pName').value;
        const kSelect = document.getElementById('pKlan');
        myColor = kSelect.options[kSelect.selectedIndex].dataset.color;
        myKlan = kSelect.value;
        
        if(!myName) return;
        
        // Başlangıç Koordinatı (Rastgele Kara)
        x = Math.floor(Math.random() * 100) + 50;
        y = Math.floor(Math.random() * 50) + 30;

        document.getElementById('login').style.display = 'none';
        document.getElementById('player').style.display = 'flex';
        document.getElementById('nameTag').innerText = myName;
        document.getElementById('nameTag').style.backgroundColor = myColor;
        
        updateUnit();
        focusPlayer(); // Başlangıçta karaktere odaklan
    }

    // Karakteri Merkeze Al
    function focusPlayer() {
        const vp = document.getElementById('viewport');
        const targetX = (x * SIZE) - (window.innerWidth / 2);
        const targetY = (y * SIZE) - (window.innerHeight / 2);
        vp.scrollTo(targetX, targetY);
    }

    function updateUnit() {
        const p = document.getElementById('player');
        p.style.left = (x * SIZE) + "px";
        p.style.top = (y * SIZE) + "px";
    }

    document.getElementById('map').onclick = function(e) {
        const tx = Math.floor(e.offsetX / SIZE);
        const ty = Math.floor(e.offsetY / SIZE);
        const dist = Math.abs(tx - x) + Math.abs(ty - y);

        if (dist === 1) {
            x = tx; y = ty;
            updateUnit();
        } else if (dist > 1) {
            addNotification("⚠️ Hedef Çok Uzak! Sadece bitişik karelere gidebilirsin.", "#e74c3c");
        }
    };

    function addNotification(msg, color) {
        const container = document.getElementById('notification-container');
        const n = document.createElement('div');
        n.className = 'notif';
        n.style.borderRightColor = color;
        n.innerHTML = msg;
        container.appendChild(n);
        setTimeout(() => n.remove(), 5000);
    }
</script>
</body>
</html>
