<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=10.0, user-scalable=yes">
    <title>Savaş Haritası - Zoom Destekli</title>
    <style>
        body { margin: 0; background: #000; color: #2ecc71; font-family: sans-serif; overflow: hidden; touch-action: none; }
        
        #login { position: fixed; inset: 0; background: #000; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; touch-action: auto; }
        input { padding: 12px; border: 2px solid #2ecc71; background: #111; color: white; margin-bottom: 10px; width: 220px; text-align: center; border-radius: 8px; }
        button { padding: 10px 25px; background: #2ecc71; color: #000; border: none; font-weight: bold; cursor: pointer; border-radius: 8px; }

        #ui { position: fixed; top: 0; width: 100%; background: rgba(0,0,0,0.8); padding: 10px; text-align: center; border-bottom: 1px solid #2ecc71; z-index: 50; pointer-events: none; }
        #timer { font-size: 16px; font-weight: bold; color: #ff4757; }

        /* Zoom ve Kaydırma İçerici */
        #container { width: 100vw; height: 100vh; overflow: hidden; position: relative; cursor: grab; }
        
        #map { 
            width: 20000px; 
            height: 10000px; 
            background-image: url('https://upload.wikimedia.org/wikipedia/commons/e/ec/World_map_blank_without_borders.svg'); 
            background-size: cover;
            position: absolute;
            transform-origin: 0 0;
            will-change: transform;
        }

        .unit { 
            position: absolute; 
            width: 50px; height: 50px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            z-index: 10;
            transition: left 0.4s, top 0.4s;
        }
        .unit-icon { font-size: 40px; filter: drop-shadow(0 0 5px gold); }
        .unit-name { font-size: 12px; background: black; color: #fff; padding: 2px 6px; border: 1px solid #2ecc71; border-radius: 4px; white-space: nowrap; }
    </style>
</head>
<body>

<div id="login">
    <h1>SAVAŞ ALANI</h1>
    <input type="text" id="pName" placeholder="İsim Yazın" oninput="this.value = this.value.replace(/[0-9]/g, '')">
    <button onclick="basla()">BAĞLAN</button>
</div>

<div id="ui">
    <div id="timer">HAZIR</div>
    <div style="font-size: 10px;">Zoom: Parmakla sıkıştır | Hareket: Dokun</div>
</div>

<div id="container">
    <div id="map">
        <div id="player" class="unit" style="display:none;">
            <span class="unit-icon">🏇</span>
            <span id="nameTag" class="unit-name"></span>
        </div>
    </div>
</div>

<script>
    let x = 200, y = 100;
    const SIZE = 50;
    let lastMoveTime = 0;
    const cooldown = 5000;

    // Zoom ve Kaydırma Değişkenleri
    let scale = 0.5; // Başlangıç uzaklığı
    let posX = 0, posY = 0;
    const mapEl = document.getElementById('map');
    const container = document.getElementById('container');

    function basla() {
        const name = document.getElementById('pName').value.trim();
        if(!name) return;
        document.getElementById('nameTag').innerText = name;
        document.getElementById('login').style.display = 'none';
        document.getElementById('player').style.display = 'flex';
        
        // Atı merkeze al
        posX = -(x * SIZE * scale) + (window.innerWidth / 2);
        posY = -(y * SIZE * scale) + (window.innerHeight / 2);
        updateTransform();
        render();
    }

    function render() {
        const p = document.getElementById('player');
        p.style.left = (x * SIZE) + "px";
        p.style.top = (y * SIZE) + "px";
    }

    function updateTransform() {
        mapEl.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`;
    }

    // Dokunmatik ve Mouse ile Harita Kontrolü (Zoom & Pan)
    let isDragging = false;
    let startX, startY;
    let initialDist = -1;

    container.onmousedown = (e) => { isDragging = true; startX = e.clientX - posX; startY = e.clientY - posY; container.style.cursor = 'grabbing'; };
    window.onmouseup = () => { isDragging = false; container.style.cursor = 'grab'; };
    window.onmousemove = (e) => {
        if (!isDragging) return;
        posX = e.clientX - startX;
        posY = e.clientY - startY;
        updateTransform();
    };

    // Mobil Zoom ve Kaydırma
    container.ontouchstart = (e) => {
        if (e.touches.length === 2) {
            initialDist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
        } else {
            startX = e.touches[0].pageX - posX;
            startY = e.touches[0].pageY - posY;
        }
    };

    container.ontouchmove = (e) => {
        if (e.touches.length === 2) {
            const dist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
            const zoom = dist / initialDist;
            scale = Math.min(Math.max(scale * zoom, 0.1), 3);
            initialDist = dist;
            updateTransform();
        } else {
            posX = e.touches[0].pageX - startX;
            posY = e.touches[0].pageY - startY;
            updateTransform();
        }
    };

    // Tıklama ile Hareket
    container.onclick = (e) => {
        const now = Date.now();
        if (now - lastMoveTime < cooldown || isDragging) return;

        // Harita üzerindeki gerçek koordinatı bul (Zoom dikkate alınarak)
        const rect = mapEl.getBoundingClientRect();
        const clickX = (e.clientX - rect.left) / scale;
        const clickY = (e.clientY - rect.top) / scale;

        const tx = Math.floor(clickX / SIZE);
        const ty = Math.floor(clickY / SIZE);

        const dist = Math.abs(tx - x) + Math.abs(ty - y);
        if (dist === 1) {
            x = tx; y = ty;
            lastMoveTime = now;
            render();
        }
    };

    // Timer Döngüsü
    setInterval(() => {
        const diff = Date.now() - lastMoveTime;
        document.getElementById('timer').innerText = diff < cooldown ? "BEKLE: " + Math.ceil((cooldown - diff) / 1000) + "s" : "HAREKETE HAZIR";
    }, 500);
</script>

</body>
</html>
