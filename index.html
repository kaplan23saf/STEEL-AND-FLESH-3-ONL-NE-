<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Kara ve Deniz Savaşları</title>
    <style>
        body { margin: 0; background: #000; color: #2ecc71; font-family: sans-serif; overflow: hidden; }
        #login { position: fixed; inset: 0; background: #000; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        input { padding: 12px; border: 2px solid #2ecc71; background: #111; color: white; margin-bottom: 10px; width: 220px; text-align: center; border-radius: 8px; }
        button { padding: 10px 25px; background: #2ecc71; color: #000; border: none; font-weight: bold; cursor: pointer; border-radius: 8px; }
        #ui { position: fixed; top: 0; width: 100%; background: rgba(0,0,0,0.9); padding: 10px; text-align: center; border-bottom: 1px solid #2ecc71; z-index: 50; pointer-events: none; }
        #timer { font-size: 18px; font-weight: bold; color: #ff4757; }
        #viewport { width: 100vw; height: 100vh; overflow: auto; background: #000; }
        #map { width: 15000px; height: 8000px; position: relative; }
        #map-img { width: 100%; height: 100%; display: block; }
        .unit { position: absolute; width: 60px; height: 60px; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; transition: all 0.5s; }
        .unit-icon { font-size: 45px; filter: drop-shadow(0 0 10px gold); }
        .unit-name { font-size: 12px; background: rgba(0,0,0,0.8); color: #fff; padding: 2px 6px; border: 1px solid #2ecc71; border-radius: 4px; white-space: nowrap; }
        canvas { display: none; } /* Renk tespiti için gizli tuval */
    </style>
</head>
<body>

<canvas id="colorDetector"></canvas>

<div id="login">
    <h1>STRATEJİ MERKEZİ</h1>
    <input type="text" id="pName" placeholder="Komutan İsmi" oninput="this.value = this.value.replace(/[0-9]/g, '')">
    <button onclick="basla()">SEFERE BAŞLA</button>
</div>

<div id="ui">
    <div id="status">Bölge: Keşfediliyor...</div>
    <div id="timer">HAZIR</div>
</div>

<div id="viewport">
    <div id="map">
        <img id="map-img" src="https://upload.wikimedia.org/wikipedia/commons/e/ec/World_map_blank_without_borders.svg" crossorigin="anonymous">
        <div id="player" class="unit" style="display:none;">
            <span id="pIcon" class="unit-icon">🏇</span>
            <span id="nameTag" class="unit-name"></span>
        </div>
    </div>
</div>

<script>
    let x = 150, y = 80;
    const SIZE = 80;
    let lastMoveTime = 0;
    let currentCooldown = 5000;
    let isSea = false;

    const img = document.getElementById('map-img');
    const canvas = document.getElementById('colorDetector');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });

    function basla() {
        const name = document.getElementById('pName').value.trim();
        if(!name) return;
        document.getElementById('nameTag').innerText = name;
        document.getElementById('login').style.display = 'none';
        document.getElementById('player').style.display = 'flex';
        
        // Harita verisini canvas'a çek (Renk tespiti için)
        canvas.width = 1500; // Performans için küçük ölçek
        canvas.height = 800;
        ctx.drawImage(img, 0, 0, 1500, 800);
        
        render();
        document.getElementById('player').scrollIntoView({ block: 'center', inline: 'center' });
    }

    function checkArea(targetX, targetY) {
        // Haritadaki koordinatın rengini kontrol et
        const mapW = 15000, mapH = 8000;
        const sampleX = (targetX * SIZE / mapW) * canvas.width;
        const sampleY = (targetY * SIZE / mapH) * canvas.height;
        
        const pixel = ctx.getImageData(sampleX, sampleY, 1, 1).data;
        // pixel[0,1,2] -> R,G,B değerleri. Siyah/Koyu renkler düşük değerlerdir.
        // Eğer renk çok koyuysa denizdir (Basit bir eşik değeri: 50)
        return (pixel[0] < 100 && pixel[1] < 100 && pixel[2] < 100);
    }

    function render() {
        const p = document.getElementById('player');
        const icon = document.getElementById('pIcon');
        const status = document.getElementById('status');
        
        isSea = checkArea(x, y);
        
        if(isSea) {
            icon.innerText = "🚢";
            currentCooldown = 10000;
            status.innerText = "Bölge: Engin Denizler (10s)";
            status.style.color = "#3498db";
        } else {
            icon.innerText = "🏇";
            currentCooldown = 5000;
            status.innerText = "Bölge: Kara Toprakları (5s)";
            status.style.color = "#2ecc71";
        }

        p.style.left = (x * SIZE) + "px";
        p.style.top = (y * SIZE) + "px";
    }

    document.getElementById('map').onclick = function(e) {
        const now = Date.now();
        if (now - lastMoveTime < currentCooldown) return;

        const tx = Math.floor(e.offsetX / SIZE);
        const ty = Math.floor(e.offsetY / SIZE);

        if (Math.abs(tx - x) + Math.abs(ty - y) === 1) {
            x = tx; y = ty;
            lastMoveTime = now;
            render();
        }
    };

    setInterval(() => {
        const diff = Date.now() - lastMoveTime;
        const timerDiv = document.getElementById('timer');
        if (diff < currentCooldown) {
            timerDiv.innerText = "İNTİKAL: " + Math.ceil((currentCooldown - diff) / 1000) + "s";
            timerDiv.style.color = "#ff4757";
        } else {
            timerDiv.innerText = "HAREKETE HAZIR";
            timerDiv.style.color = "#2ecc71";
        }
    }, 500);
</script>

</body>
</html>
