<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=10.0, user-scalable=yes">
    <title>Klanlar: Elazığ Karargahı (Canlı)</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        #login { position: fixed; inset: 0; background: #000; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center;}
        input, select { padding: 12px; border: 2px solid #2ecc71; background: #111; color: white; margin-bottom: 10px; width: 250px; border-radius: 8px; }
        button { padding: 12px 40px; background: #2ecc71; color: #000; border: none; font-weight: bold; cursor: pointer; border-radius: 8px; }
        
        #ui { position: fixed; top: 0; width: 100%; background: rgba(0,0,0,0.8); padding: 10px; text-align: center; z-index: 50; border-bottom: 1px solid #2ecc71; }
        #klan-listesi { position: fixed; left: 20px; top: 15%; z-index: 40; pointer-events: none; text-shadow: 2px 2px 5px #000; }
        .klan-item { font-weight: bold; font-size: 15px; margin-bottom: 5px; }

        #viewport { width: 100vw; height: 100vh; overflow: auto; background: #000; }
        #map { width: 15000px; height: 8000px; position: relative; }
        #map-img { width: 100%; height: 100%; display: block; }

        .unit { position: absolute; width: 80px; height: 80px; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; transition: all 0.5s; cursor: pointer; }
        .unit-img { width: 70px; height: 70px; object-fit: contain; filter: drop-shadow(0 0 8px gold); }
        .unit-name { font-size: 11px; padding: 2px 8px; border-radius: 4px; font-weight: bold; margin-top: 2px; white-space: nowrap; }

        .building { position: absolute; width: 140px; height: 140px; transform: translate(-50%, -50%); z-index: 5; text-align: center; }
        .building img { width: 100%; height: 100%; object-fit: contain; }
        .owner-tag { font-size: 10px; background: rgba(0,0,0,0.8); padding: 2px 5px; border-radius: 3px; position: absolute; bottom: -10px; left: 50%; transform: translateX(-50%); width: max-content;}

        #build-menu { position: fixed; left: 50%; top: 50%; transform: translate(-50%, -50%); background: #111; border: 2px solid #2ecc71; padding: 20px; z-index: 200; display: none; border-radius: 15px; }
        .build-btn { display: block; width: 200px; padding: 10px; margin: 5px; background: #222; border: 1px solid #2ecc71; color: white; cursor: pointer; }
        
        #tracker-arrow { position: fixed; width: 0; height: 0; border-left: 10px solid transparent; border-right: 10px solid transparent; border-bottom: 25px solid #2ecc71; z-index: 90; display: none; }
        canvas { display: none; }
    </style>
</head>
<body>

<canvas id="mapCanvas"></canvas>
<div id="tracker-arrow"></div>

<div id="build-menu">
    <h3 style="color:#2ecc71; margin:0 0 10px 0;">MİMARİ PLANLAR</h3>
    <div id="build-options"></div>
    <button onclick="document.getElementById('build-menu').style.display='none'" style="background:red; color:white; margin-top:10px;">İPTAL</button>
</div>

<div id="ui">
    <div id="timer">HAZIR</div>
    <div id="status" style="color:gold; font-size: 12px;"></div>
</div>

<div id="login">
    <h1 style="color:#2ecc71;">ELAZIĞ STRATEJİ MERKEZİ</h1>
    <input type="text" id="pName" placeholder="Karakter İsmi">
    <select id="pKlan">
        <option value="">Taraf Seçin...</option>
        <option value="LORD" data-color="gold">YÜCE LORD</option>
        <option value="AVAR" data-color="#2ecc71">AVAR</option>
        <option value="DAI" data-color="#9b59b6">D.A.İ</option>
        <option value="SPARTA" data-color="#e74c3c">SPARTA</option>
        <option value="ESKIYA" data-color="#444">EŞKIYA</option>
    </select>
    <button onclick="basla()">SEFERE BAŞLA</button>
</div>

<div id="viewport">
    <div id="map">
        <img id="map-img" src="https://upload.wikimedia.org/wikipedia/commons/e/ec/World_map_blank_without_borders.svg" crossorigin="anonymous">
    </div>
</div>

<script>
    // --- BAĞLANTI AYARLARI ---
    const _URL = "https://nfyqinmktmmdurklsred.supabase.co";
    const _KEY = "Sb_publishable_M6G0bwXo3kkFf9wGY9xz_A_DlDWrvm8";
    const supabase = exports.supabase.createClient(_URL, _KEY);

    const assets = {
        koy: '1004.png', kale: '1005.png', sehir: '1006.png', 
        liman: '1008.png', gemi: '1007.png', eskiya: '1775228955923.png'
    };

    let myId = localStorage.getItem('pid') || Math.random().toString(36).substr(2, 9);
    localStorage.setItem('pid', myId);

    let x = 0, y = 0, SIZE = 80;
    let myName = "", myKlan = "", myColor = "";
    let lastMove = 0, buildEnd = 0;

    const canvas = document.getElementById('mapCanvas');
    const ctx = canvas.getContext('2d', {willReadFrequently: true});
    const mapImg = document.getElementById('map-img');

    async function basla() {
        myName = document.getElementById('pName').value.trim();
        const sel = document.getElementById('pKlan');
        if(!myName || !sel.value) return alert("Bilgileri girin!");
        
        myKlan = sel.value;
        myColor = sel.options[sel.selectedIndex].dataset.color;

        // Harita yükleme ve başlangıç konumu
        canvas.width = 1500; canvas.height = 800;
        ctx.drawImage(mapImg, 0, 0, 1500, 800);
        
        findSafeSpot();
        document.getElementById('login').style.display = 'none';
        
        // İlk kayıt ve dinleme başlat
        await syncPlayer();
        loadWorld();
        setInterval(syncPlayer, 3000); // 3 saniyede bir konum güncelle
        
        // Canlı dinleme (Realtime)
        supabase.channel('world').on('postgres_changes', {event:'*', schema:'public'}, () => {
            loadWorld();
        }).subscribe();

        requestAnimationFrame(updateArrow);
    }

    function findSafeSpot() {
        while(true) {
            let rx = Math.floor(Math.random()*180), ry = Math.floor(Math.random()*90);
            if(!checkSea(rx, ry)) { x = rx; y = ry; break; }
        }
    }

    function checkSea(cx, cy) {
        const sx = (cx * SIZE / 15000) * 1500;
        const sy = (cy * SIZE / 8000) * 800;
        const p = ctx.getImageData(sx, sy, 1, 1).data;
        return (p[0] < 150 && p[1] < 150 && p[2] < 150);
    }

    async function syncPlayer() {
        await supabase.from('players').upsert({
            id: myId, name: myName, klan: myKlan, color: myColor, x, y, last_seen: new Error().toISOString()
        });
    }

    async function loadWorld() {
        // Diğer oyuncuları çek
        const { data: players } = await supabase.from('players').select('*');
        const { data: structs } = await supabase.from('structures').select('*');

        const mapDiv = document.getElementById('map');
        // Temizlik (Map imajı hariç her şeyi sil)
        Array.from(mapDiv.children).forEach(c => { if(c.id !== 'map-img') c.remove(); });

        // Yapıları çiz
        structs.forEach(s => {
            const d = document.createElement('div');
            d.className = 'building';
            d.style.left = (s.x * SIZE + 40) + "px";
            d.style.top = (s.y * SIZE + 40) + "px";
            let imgName = s.type === 'Köy' ? assets.koy : s.type === 'Kale' ? assets.kale : s.type === 'Şehir' ? assets.sehir : assets.liman;
            d.innerHTML = `<img src="${imgName}"><div class="owner-tag">${s.type} - ${s.owner_name}</div>`;
            mapDiv.appendChild(d);
        });

        // Oyuncuları çiz
        players.forEach(p => {
            const u = document.createElement('div');
            u.className = 'unit';
            u.style.left = (p.x * SIZE) + "px";
            u.style.top = (p.y * SIZE) + "px";
            
            const isSea = checkSea(p.x, p.y);
            let img = isSea ? assets.gemi : (p.klan === 'ESKIYA' ? assets.eskiya : (p.klan === 'LORD' ? assets.kale : '🏇'));
            
            u.innerHTML = img.endsWith('.png') ? `<img src="${img}" class="unit-img">` : `<span style="font-size:40px;">${img}</span>`;
            u.innerHTML += `<span class="unit-name" style="background:${p.color}">${p.name}</span>`;
            
            if(p.id === myId) u.onclick = showBuildMenu;
            mapDiv.appendChild(u);
        });
    }

    function showBuildMenu() {
        if(Date.now() < buildEnd) return;
        const menu = document.getElementById('build-menu');
        const opt = document.getElementById('build-options');
        opt.innerHTML = ''; menu.style.display = 'block';

        const types = [{n:'Köy', s:10}, {n:'Kale', s:20}, {n:'Şehir', s:30}];
        if(checkSea(x+1,y)||checkSea(x-1,y)||checkSea(x,y+1)||checkSea(x,y-1)) types.push({n:'Liman', s:15});

        types.forEach(t => {
            const b = document.createElement('button'); b.className = 'build-btn';
            b.innerText = `${t.n} İnşa Et`;
            b.onclick = async () => {
                buildEnd = Date.now() + (t.s * 1000);
                menu.style.display = 'none';
                setTimeout(async () => {
                    await supabase.from('structures').insert({ owner_name: myName, type: t.n, x, y });
                    loadWorld();
                }, t.s * 1000);
            };
            opt.appendChild(b);
        });
    }

    document.getElementById('map').onclick = async function(e) {
        if(e.target.id !== 'map-img') return;
        const cd = checkSea(x,y) ? 10000 : 5000;
        if(Date.now() - lastMove < cd) return;

        const tx = Math.floor(e.offsetX / SIZE), ty = Math.floor(e.offsetY / SIZE);
        if(Math.abs(tx-x) + Math.abs(ty-y) === 1) {
            x = tx; y = ty;
            lastMove = Date.now();
            await syncPlayer();
            loadWorld();
        }
    };

    setInterval(() => {
        const now = Date.now();
        const cd = checkSea(x,y) ? 10000 : 5000;
        document.getElementById('timer').innerText = (now-lastMove < cd) ? `İNTİKAL: ${Math.ceil((cd-(now-lastMove))/1000)}s` : "HAZIR";
        if(now < buildEnd) document.getElementById('status').innerText = `İnşaat Sürüyor: ${Math.ceil((buildEnd-now)/1000)}s`;
        else document.getElementById('status').innerText = "";
    }, 500);

    function updateArrow() {
        const p = document.querySelector(`[style*="left: ${x*SIZE}px"]`);
        if(!p) return requestAnimationFrame(updateArrow);
        const r = p.getBoundingClientRect(), arrow = document.getElementById('tracker-arrow');
        if (r.left>=0 && r.right<=window.innerWidth && r.top>=0 && r.bottom<=window.innerHeight) arrow.style.display='none';
        else {
            arrow.style.display='block';
            let ax = Math.min(Math.max(r.left+40, 20), window.innerWidth-40), ay = Math.min(Math.max(r.top+40, 80), window.innerHeight-40);
            arrow.style.left = ax+"px"; arrow.style.top = ay+"px";
            arrow.style.transform = `rotate(${Math.atan2((r.top+40)-ay, (r.left+40)-ax)*(180/Math.PI)-90}deg)`;
        }
        requestAnimationFrame(updateArrow);
    }
</script>
</body>
</html>
