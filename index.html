<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elazığ Cephesi - Komutan</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Segoe UI', Tahoma, sans-serif; overflow: hidden; }
        #edge-tracker { position: fixed; width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-bottom: 30px solid #2ecc71; z-index: 1000; display: none; pointer-events: none; filter: drop-shadow(0 0 10px #2ecc71); }
        #notification-container { position: fixed; top: 15px; right: 15px; width: 260px; z-index: 999; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
        .notif { background: rgba(0, 0, 0, 0.9); border-left: 5px solid #2ecc71; padding: 10px 15px; font-size: 12px; border-radius: 5px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); animation: slideIn 0.3s ease, fadeOut 0.5s 4.5s forwards; }
        #ui-top { position: fixed; top: 0; width: 100%; background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent); padding: 10px; text-align: center; z-index: 500; border-bottom: 2px solid rgba(46, 204, 113, 0.3); }
        #clan-list { position: fixed; left: 15px; top: 60px; width: 220px; background: rgba(10, 10, 10, 0.9); border: 1px solid rgba(46, 204, 113, 0.5); padding: 10px; border-radius: 8px; z-index: 500; box-shadow: 0 0 15px rgba(0,0,0,0.7); }
        #clan-toggle-btn { color: #2ecc71; font-size: 15px; margin: 0; text-align: center; text-transform: uppercase; cursor: pointer; padding: 5px; border-radius: 5px; transition: 0.3s; display: flex; justify-content: space-between; align-items: center; user-select: none; }
        #clans-container { max-height: 400px; overflow-y: auto; margin-top: 10px; border-top: 1px solid rgba(46,204,113,0.3); padding-top: 10px; display: none; }
        #zoom-controls { position: fixed; bottom: 20px; right: 20px; z-index: 500; display: flex; gap: 10px; }
        .zoom-btn { background: #222; border: 2px solid #2ecc71; color: #fff; width: 45px; height: 45px; font-size: 20px; font-weight: bold; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        #build-menu { position: fixed; left: 50%; top: 50%; transform: translate(-50%, -50%); background: rgba(10,10,10,0.98); border: 3px solid #2ecc71; padding: 30px; z-index: 1100; display: none; border-radius: 20px; text-align: center; box-shadow: 0 0 50px rgba(46, 204, 113, 0.2); }
        .build-btn { display: block; width: 250px; padding: 12px; margin: 10px; background: #1a1a1a; border: 1px solid #2ecc71; color: #fff; cursor: pointer; border-radius: 10px; font-weight: bold; transition: 0.3s; }
        #viewport { width: 100vw; height: 100vh; overflow: auto; background: #000911; scroll-behavior: smooth; }
        #map { width: 15000px; height: 8000px; position: relative; transform-origin: 0 0; transition: transform 0.1s ease; }
        #map-img { width: 100%; height: 100%; display: block; opacity: 0.8; }
        #player { position: absolute; width: 20px; height: 20px; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 200; transition: all 0.2s linear; cursor: pointer; }
        .arrow-indicator { position: absolute; top: -15px; font-size: 14px; color: #f1c40f; filter: drop-shadow(0 0 3px #000); animation: bounce 0.8s infinite; }
        .building { position: absolute; width: 20px; height: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 50; pointer-events: none; }
        .build-icon { font-size: 20px; }
        .build-owner-tag { font-size: 9px; background: rgba(0,0,0,0.85); padding: 2px 5px; border-radius: 3px; border: 1px solid; font-weight: bold; }
        #login { position: fixed; inset: 0; background: radial-gradient(circle, #1a1a1a 0%, #000 100%); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        input, select { padding: 15px; border: 2px solid #2ecc71; background: #111; color: white; margin-bottom: 15px; width: 320px; border-radius: 10px; }
        button#start-btn { padding: 15px 60px; background: #2ecc71; color: #000; border: none; font-weight: bold; cursor: pointer; border-radius: 10px; font-size: 18px; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
        @keyframes fadeOut { to { opacity: 0; } }
        canvas { display: none; }
    </style>
</head>
<body>

<div id="edge-tracker"></div>
<canvas id="mapCanvas"></canvas>
<div id="notification-container"></div>

<div id="ui-top"><span id="move-timer">HAREKET: HAZIR</span></div>

<div id="clan-list">
    <h3 id="clan-toggle-btn" onclick="toggleClanList()">Klanlar <span id="clan-toggle-icon">▼</span></h3>
    <div id="clans-container"></div>
</div>

<div id="zoom-controls">
    <button class="zoom-btn" onclick="adjustZoom(0.2)">+</button>
    <button class="zoom-btn" onclick="adjustZoom(-0.2)">-</button>
</div>

<div id="build-menu">
    <h2 style="color:#2ecc71;">YAPI İNŞA ET</h2>
    <button class="build-btn" onclick="startBuild('Köy', '🏡')">Köy (🏡)</button>
    <button class="build-btn" onclick="startBuild('Kale', '🏰')">Kale (🏰)</button>
    <button class="build-btn" onclick="startBuild('Şehir', '🏯')">Şehir (🏯)</button>
    <button class="build-btn" onclick="startBuild('Liman', '⚓')">Liman (⚓)</button>
    <button onclick="document.getElementById('build-menu').style.display='none'" style="color:red; background:none; border:none; cursor:pointer;">VAZGEÇ</button>
</div>

<div id="login">
    <h1 style="color: #2ecc71;">ELAZIĞ CEPHESİ</h1>
    <input type="text" id="pName" placeholder="Kahraman İsmi">
    <select id="pKlan">
        <option value="AVAR" data-color="#2ecc71">AVAR (Yeşil)</option>
        <option value="DEVLET-İ ALİYYE-İ İSLAM" data-color="#9b59b6">DEVLET-İ ALİYYE-İ İSLAM (Mor)</option>
        <option value="SPARTA" data-color="#ff9800">SPARTA (Turuncu)</option>
        <option value="CRM" data-color="#ff0000">CRM (Kırmızı)</option>
        <option value="VAMPİRE" data-color="#555555">VAMPİRE (Füme)</option>
        <option value="NEW_CLAN" data-color="#ffffff">➕ Yeni Klan Oluştur...</option>
    </select>
    <button id="start-btn" onclick="basla()">SAVAŞI BAŞLAT</button>
</div>

<div id="viewport">
    <div id="map">
        <img id="map-img" src="https://upload.wikimedia.org/wikipedia/commons/e/ec/World_map_blank_without_borders.svg" crossorigin="anonymous">
        <div id="player" onclick="openBuildMenu()">
            <div class="arrow-indicator">▼</div>
            <span id="pIcon" style="font-size:16px;">🏇</span>
            <span id="nameTag" style="font-size:8px; padding:2px; border-radius:2px; color:white;"></span>
        </div>
    </div>
</div>

<script>
    const supabaseClient = window.supabase.createClient("https://nfyqinmktmmdurklsred.supabase.co", "Sb_publishable_M6G0bwXo3kkFf9wGY9xz_A_DlDWrvm8");

    let x = 300, y = 200; // Varsayılan başlangıç
    const SIZE = 20; 
    let zoom = 1.0; 
    let lastMoveTime = 0;
    let structures = []; 
    let localStructures = []; 
    let myId = localStorage.getItem('playerId') || Math.random().toString(36).substr(2, 9);
    localStorage.setItem('playerId', myId);
    let myColor, myKlan, myName;

    const canvas = document.getElementById('mapCanvas');
    const ctx = canvas.getContext('2d');
    const mapImg = document.getElementById('map-img');

    function toggleClanList() {
        const c = document.getElementById('clans-container');
        c.style.display = (c.style.display === 'none' || c.style.display === '') ? 'block' : 'none';
    }

    function basla() {
        try {
            myName = document.getElementById('pName').value.trim();
            if(!myName) return alert("İsim girmelisin!");

            const kSelect = document.getElementById('pKlan');
            if(kSelect.value === "NEW_CLAN") {
                let custom = prompt("Klan adı:");
                myKlan = custom ? custom.toUpperCase() : "BAĞIMSIZ";
                myColor = `hsl(${Math.floor(Math.random() * 360)}, 80%, 60%)`;
            } else {
                myKlan = kSelect.value;
                myColor = kSelect.options[kSelect.selectedIndex].dataset.color;
            }

            // Rastgele konum
            x = Math.floor(Math.random() * 500) + 50;
            y = Math.floor(Math.random() * 250) + 50;

            document.getElementById('login').style.display = 'none';
            document.getElementById('player').style.display = 'flex';
            document.getElementById('nameTag').innerText = myName;
            document.getElementById('nameTag').style.backgroundColor = myColor;

            updateUnit();
            focusPlayer();
            initMultiplayer();
            requestAnimationFrame(updateEdgeTracker);
        } catch (err) {
            console.error("Başlatma hatası:", err);
            alert("Bir hata oluştu, konsola bak.");
        }
    }

    function adjustZoom(amount) {
        zoom = Math.min(Math.max(zoom + amount, 0.4), 3.0);
        document.getElementById('map').style.transform = `scale(${zoom})`;
    }

    function focusPlayer() {
        const vp = document.getElementById('viewport');
        vp.scrollTo(((x * SIZE) * zoom) - (window.innerWidth / 2), ((y * SIZE) * zoom) - (window.innerHeight / 2));
    }

    function updateEdgeTracker() {
        const p = document.getElementById('player');
        const tracker = document.getElementById('edge-tracker');
        const rect = p.getBoundingClientRect();
        const off = rect.left < 0 || rect.right > window.innerWidth || rect.top < 0 || rect.bottom > window.innerHeight;
        tracker.style.display = off ? 'block' : 'none';
        if(off) {
            tracker.style.left = Math.min(Math.max(rect.left, 20), window.innerWidth-40) + 'px';
            tracker.style.top = Math.min(Math.max(rect.top, 80), window.innerHeight-40) + 'px';
        }
        requestAnimationFrame(updateEdgeTracker);
    }

    function openBuildMenu() { document.getElementById('build-menu').style.display = 'block'; }

    async function startBuild(type, icon) {
        document.getElementById('build-menu').style.display = 'none';
        const bName = prompt("Yapı ismi:");
        if(!bName) return;
        const ownerStr = `${myName}||${myColor}||${bName}`;
        localStructures.push({ x, y, type: icon, owner_name: ownerStr });
        renderBuildings();
        await supabaseClient.from('structures').insert([{ owner_name: ownerStr, type: icon, x, y }]);
    }

    function updateUnit() {
        const p = document.getElementById('player');
        p.style.left = (x * SIZE) + "px";
        p.style.top = (y * SIZE) + "px";
        
        // Deniz kontrolünü sadece resim yüklendiyse yap (hata önleyici)
        try {
            canvas.width = 1500; canvas.height = 800;
            ctx.drawImage(mapImg, 0, 0, 1500, 800);
            const pix = ctx.getImageData((x*SIZE/15000)*1500, (y*SIZE/8000)*800, 1, 1).data;
            document.getElementById('pIcon').innerText = (pix[0] < 150 && pix[1] < 150 && pix[2] < 150) ? "🚢" : "🏇";
        } catch(e) { document.getElementById('pIcon').innerText = "🏇"; }

        supabaseClient.from('players').upsert({ id: myId, name: myName, klan: myKlan, color: myColor, x, y, last_seen: new Date().toISOString() }).then();
    }

    document.getElementById('map').onclick = function(e) {
        if(e.target.id !== 'map-img') return;
        const rect = mapImg.getBoundingClientRect();
        const tx = Math.floor(((e.clientX - rect.left) / zoom) / SIZE);
        const ty = Math.floor(((e.clientY - rect.top) / zoom) / SIZE);
        
        const now = Date.now();
        if(now - lastMoveTime < 1000) return; // 1 saniye hız sınırı

        if (tx > x) x++; else if (tx < x) x--;
        else if (ty > y) y++; else if (ty < y) y--;
        
        lastMoveTime = now;
        updateUnit();
    };

    function renderBuildings() {
        const mapDiv = document.getElementById('map');
        mapDiv.querySelectorAll('.building').forEach(n => n.remove());
        localStructures.forEach(s => {
            let parts = s.owner_name.split("||");
            const b = document.createElement('div');
            b.className = 'building';
            b.style.left = (s.x * SIZE) + "px"; b.style.top = (s.y * SIZE) + "px";
            b.innerHTML = `<span class="build-icon">${s.type}</span><span class="build-owner-tag" style="color:${parts[1]}; border-color:${parts[1]}">${parts[2]}</span>`;
            mapDiv.appendChild(b);
        });
    }

    async function initMultiplayer() {
        loadWorld();
        setInterval(loadWorld, 5000);
    }

    async function loadWorld() {
        const { data: dbS } = await supabaseClient.from('structures').select('*');
        const { data: dbP } = await supabaseClient.from('players').select('*');
        
        if(dbS) {
            dbS.forEach(s => {
                if(!localStructures.find(ls => ls.x === s.x && ls.y === s.y)) localStructures.push(s);
            });
            renderBuildings();
        }

        const clansCont = document.getElementById('clans-container');
        clansCont.innerHTML = '';
        let clans = {"AVAR":{c:"#2ecc71",m:[]},"DEVLET-İ ALİYYE-İ İSLAM":{c:"#9b59b6",m:[]},"SPARTA":{c:"#ff9800",m:[]},"CRM":{c:"#ff0000",m:[]},"VAMPİRE":{c:"#555555",m:[]}};

        if(dbP) {
            dbP.forEach(p => {
                if(Date.now() - new Date(p.last_seen).getTime() < 60000) {
                    if(!clans[p.klan]) clans[p.klan] = {c: p.color || "#fff", m:[]};
                    clans[p.klan].m.push(p.name);
                    if(p.id !== myId) {
                        // Diğer oyuncuları çiz (Basitleştirilmiş)
                        const u = document.createElement('div');
                        u.className = 'building'; u.style.left = (p.x*SIZE)+'px'; u.style.top = (p.y*SIZE)+'px';
                        u.innerHTML = `🏇<span style="font-size:7px; background:${p.color}">${p.name}</span>`;
                        document.getElementById('map').appendChild(u);
                    }
                }
            });
            for(let k in clans) {
                clansCont.innerHTML += `<div style="color:${clans[k].c}"><b>${k}</b>: ${clans[k].m.join(', ')}</div>`;
            }
        }
    }
</script>
</body>
</html>
