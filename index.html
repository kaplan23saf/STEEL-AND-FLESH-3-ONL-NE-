<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Dev Dünya Atlası - Strateji</title>
    <style>
        body { margin: 0; background: #000b1a; color: #f1c40f; font-family: 'Georgia', serif; overflow: hidden; }
        
        #login { position: fixed; inset: 0; background: #000; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        input { padding: 15px; border: 2px solid #2ecc71; background: #111; color: white; margin-bottom: 10px; width: 250px; text-align: center; font-size: 18px; border-radius: 10px; }
        button { padding: 12px 30px; background: #2ecc71; color: #000; border: none; font-weight: bold; cursor: pointer; border-radius: 10px; font-size: 18px; }

        #ui { position: fixed; top: 0; width: 100%; background: rgba(0,0,0,0.85); padding: 15px; text-align: center; border-bottom: 2px solid #2ecc71; z-index: 50; }
        #timer { font-size: 20px; font-weight: bold; color: #ff4757; margin-top: 5px; }

        /* Yeşil Takip Oku */
        #tracker-arrow {
            position: fixed; width: 0; height: 0;
            border-left: 15px solid transparent; border-right: 15px solid transparent;
            border-bottom: 30px solid #2ecc71; z-index: 60; display: none;
            filter: drop-shadow(0 0 15px #2ecc71); pointer-events: none;
        }

        #viewport { width: 100vw; height: 100vh; overflow: auto; position: relative; scroll-behavior: smooth; }
        #map { 
            /* DEV ÖLÇEK: 20.000 piksel genişlik */
            width: 20000px; height: 10000px; 
            background-image: url('https://upload.wikimedia.org/wikipedia/commons/e/ec/World_map_blank_without_borders.svg'); 
            background-size: 100% 100%; 
            background-repeat: no-repeat;
            position: relative; 
        }

        .unit { position: absolute; width: 120px; height: 120px; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 5; transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .unit-icon { font-size: 70px; filter: drop-shadow(0 0 15px gold); }
        .unit-name { font-size: 18px; background: rgba(0,0,0,0.9); color: #fff; padding: 4px 12px; border: 2px solid #2ecc71; border-radius: 8px; white-space: nowrap; margin-top: 5px; font-weight: bold; }
    </style>
</head>
<body>

<div id="tracker-arrow"></div>

<div id="login">
    <h1 style="color:#2ecc71; text-shadow: 0 0 10px #2ecc71;">DÜNYA HAKİMİYETİ</h1>
    <input type="text" id="pName" placeholder="Komutan İsmi Giriniz" oninput="this.value = this.value.replace(/[0-9]/g, '')">
    <button onclick="basla()">SAVAŞI BAŞLAT</button>
</div>

<div id="ui">
    <div id="msg" style="font-size: 16px;">Kıtalararası Yolculuk: Tıkla ve İlerle!</div>
    <div id="timer">HAZIR</div>
    <div id="coords" style="font-size: 12px; color: #888; margin-top:5px;">Mevcut Konum: --, --</div>
</div>

<div id="viewport">
    <div id="map">
        <div id="player" class="unit" style="display:none;">
            <span class="unit-icon">🏇</span>
            <span id="nameTag" class="unit-name"></span>
        </div>
    </div>
</div>

<script>
    // Başlangıç: Türkiye civarı (Tahmini koordinat)
    let x = 20, y = 15; 
    const SIZE = 500; // ÖLÇEK: Her tık 500 piksel (Çok büyük mesafe!)
    let lastMoveTime = 0;
    const cooldown = 5000;

    const viewport = document.getElementById('viewport');
    const player = document.getElementById('player');
    const arrow = document.getElementById('tracker-arrow');

    function basla() {
        const name = document.getElementById('pName').value.trim();
        if(name.length < 2) return alert("Geçerli bir isim girin!");
        document.getElementById('nameTag').innerText = name;
        document.getElementById('login').style.display = 'none';
        player.style.display = 'flex';
        render();
        requestAnimationFrame(updateArrow);
    }

    function render() {
        player.style.left = (x * SIZE) + "px";
        player.style.top = (y * SIZE) + "px";
        document.getElementById('coords').innerText = `Enlem/Boylam: ${x}, ${y}`;
        player.scrollIntoView({ behavior: 'smooth', block: 'center', inline: 'center' });
    }

    // YEŞİL TAKİP OKU SİSTEMİ
    function updateArrow() {
        const pRect = player.getBoundingClientRect();
        const vWidth = window.innerWidth;
        const vHeight = window.innerHeight;

        if (pRect.left >= 0 && pRect.right <= vWidth && pRect.top >= 0 && pRect.bottom <= vHeight) {
            arrow.style.display = 'none';
        } else {
            arrow.style.display = 'block';
            let arrowX = Math.min(Math.max(pRect.left + 60, 30), vWidth - 30);
            let arrowY = Math.min(Math.max(pRect.top + 60, 100), vHeight - 30);
            arrow.style.left = arrowX + "px";
            arrow.style.top = arrowY + "px";

            const angle = Math.atan2((pRect.top + 60) - arrowY, (pRect.left + 60) - arrowX);
            arrow.style.transform = `rotate(${angle * (180 / Math.PI) - 90}deg)`;
        }
        requestAnimationFrame(updateArrow);
    }

    // 5 Saniye Sayacı
    setInterval(() => {
        const now = Date.now();
        const diff = now - lastMoveTime;
        const timerDiv = document.getElementById('timer');
        if (diff < cooldown) {
            timerDiv.innerText = "İNTİKAL SÜRESİ: " + Math.ceil((cooldown - diff) / 1000) + "s";
            timerDiv.style.color = "#ff4757";
        } else {
            timerDiv.innerText = "HAREKETE HAZIR";
            timerDiv.style.color = "#2ecc71";
        }
    }, 500);

    // Hareket Mekaniği
    document.getElementById('map').onclick = function(e) {
        const now = Date.now();
        if (now - lastMoveTime < cooldown) return;

        const tx = Math.floor(e.offsetX / SIZE);
        const ty = Math.floor(e.offsetY / SIZE);

        const dist = Math.abs(tx - x) + Math.abs(ty - y);
        if (dist === 1) {
            x = tx; y = ty;
            lastMoveTime = now;
            render();
            document.getElementById('msg').innerText = "✅ Başarıyla İlerledin";
            document.getElementById('msg').style.color = "#2ecc71";
        } else if (dist !== 0) {
            document.getElementById('msg').innerText = "❌ Çok uzak! Sadece bitişik bölgelere.";
            document.getElementById('msg').style.color = "#f1c40f";
        }
    };
</script>

</body>
</html>
