<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elazığ Cephesi - Komutan</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Segoe UI', Tahoma, sans-serif; overflow: hidden; }
        
        #notification-container {
            position: fixed; top: 15px; right: 15px; width: 280px; z-index: 2000;
            display: flex; flex-direction: column; gap: 8px; pointer-events: none;
        }
        .notif {
            background: rgba(0, 0, 0, 0.9); border-left: 5px solid #2ecc71;
            padding: 12px; font-size: 13px; border-radius: 5px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            animation: slideIn 0.3s ease, fadeOut 0.5s 4.5s forwards;
            color: #fff; line-height: 1.4;
        }

        #ui-top {
            position: fixed; top: 0; width: 100%; background: rgba(0,0,0,0.8);
            padding: 10px; text-align: center; z-index: 1000; border-bottom: 2px solid #2ecc71;
        }

        #clan-list {
            position: fixed; left: 15px; top: 60px; width: 220px;
            background: rgba(15, 15, 15, 0.95); border: 1px solid #2ecc71;
            padding: 10px; border-radius: 8px; z-index: 1000;
        }
        #clan-toggle-btn { cursor: pointer; color: #2ecc71; font-weight: bold; text-align: center; border-bottom: 1px solid #333; padding-bottom: 5px; margin-bottom: 5px; }
        #clans-container { max-height: 300px; overflow-y: auto; display: none; }

        #build-menu { 
            position: fixed; left: 50%; top: 50%; transform: translate(-50%, -50%);
            background: #111; border: 3px solid #2ecc71; padding: 25px;
            z-index: 1500; display: none; border-radius: 15px; text-align: center;
        }
        .build-btn { display: block; width: 220px; padding: 10px; margin: 8px auto; background: #222; border: 1px solid #2ecc71; color: white; cursor: pointer; border-radius: 5px; font-weight: bold; }
        .build-btn:hover { background: #2ecc71; color: #000; }

        #viewport { width: 100vw; height: 100vh; overflow: auto; background: #000; }
        #map { width: 15000px; height: 8000px; position: relative; transform-origin: 0 0; }
        #map-img { width: 100%; height: 100%; display: block; opacity: 0.7; }
        
        #player { 
            position: absolute; width: 24px; height: 24px; 
            display: none; flex-direction: column; align-items: center; z-index: 500; cursor: pointer;
        }
        .name-tag { font-size: 10px; padding: 2px 5px; border-radius: 3px; font-weight: bold; white-space: nowrap; margin-top: 2px; border: 1px solid rgba(255,255,255,0.3); }

        .building { position: absolute; width: 20px; height: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; pointer-events: none; }
        .b-tag { font-size: 8px; background: rgba(0,0,0,0.8); padding: 1px 3px; border-radius: 2px; border: 1px solid; white-space: nowrap; }

        #login { position: fixed; inset: 0; background: #000; z-index: 3000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        input, select { padding: 12px; margin-bottom: 10px; width: 280px; background: #111; color: #fff; border: 1px solid #2ecc71; border-radius: 5px; }
        #start-btn { padding: 15px 50px; background: #2ecc71; color: #000; border: none; font-weight: bold; cursor: pointer; border-radius: 5px; font-size: 16px; }

        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
        @keyframes fadeOut { to { opacity: 0; } }
        canvas { display: none; }
    </style>
</head>
<body>

<canvas id="mapCanvas"></canvas>
<div id="notification-container"></div>

<div id="ui-top">
    <span id="move-timer" style="color: #2ecc71; font-weight: bold;">HAREKET: HAZIR</span>
</div>

<div id="clan-list">
    <div id="clan-toggle-btn" onclick="toggleClans()">KLANLAR / DEVLETLER ▼</div>
    <div id="clans-container"></div>
</div>

<div id="build-menu">
    <h3 style="color:#2ecc71; margin-top:0;">YAPI İNŞA ET</h3>
    <button class="build-btn" onclick="tryBuild('Köy', '🏡')">Köy (🏡)</button>
    <button class="build-btn" onclick="tryBuild('Kale', '🏰')">Kale (🏰)</button>
    <button class="build-btn" onclick="tryBuild('Şehir', '🏯')">Şehir (🏯)</button>
    <button class="build-btn" onclick="tryBuild('Liman', '⚓')">Liman (⚓)</button>
    <button onclick="document.getElementById('build-menu').style.display='none'" style="color:red; background:none; border:none; cursor:pointer; margin-top:10px;">İPTAL</button>
</div>

<div id="login">
    <h1 style="color:#2ecc71; letter-spacing:3px;">ELAZIĞ CEPHESİ</h1>
    <input type="text" id="pName" placeholder="Komutan İsmi">
    <select id="pKlan">
        <option value="AVAR" data-color="#2ecc71">AVAR (Yeşil)</option>
        <option value="DEVLET-İ ALİYYE-İ İSLAM" data-color="#9b59b6">DEVLET-İ ALİYYE (Mor)</option>
        <option value="SPARTA" data-color="#ff9800">SPARTA (Turuncu)</option>
        <option value="CRM" data-color="#ff0000">CRM (Kırmızı)</option>
        <option value="VAMPİRE" data-color="#7f8c8d">VAMPİRE (Füme)</option>
        <option value="YENİ_KLAN" data-color="#ffffff">+ Yeni Klan Oluştur</option>
    </select>
    <button id="start-btn" onclick="basla()">SAVAŞI BAŞLAT</button>
</div>

<div id="viewport">
    <div id="map">
        <img id="map-img" src="https://upload.wikimedia.org/wikipedia/commons/e/ec/World_map_blank_without_borders.svg" crossorigin="anonymous">
        <div id="player" onclick="document.getElementById('build-menu').style.display='block'">
            <span id="pIcon" style="font-size:20px;">🏇</span>
            <span id="nameTag" class="name-tag"></span>
        </div>
    </div>
</div>

<script>
    const supabaseClient = window.supabase.createClient("https://nfyqinmktmmdurklsred.supabase.co", "Sb_publishable_M6G0bwXo3kkFf9wGY9xz_A_DlDWrvm8");

    let x = 300, y = 200, SIZE = 20, zoom = 1.0;
    let lastMoveTime = 0, structures = [], localBuildings = [];
    let myId = localStorage.getItem('playerId') || Math.random().toString(36).substr(2, 9);
    localStorage.setItem('playerId', myId);
    let myName, myKlan, myColor;

    const canvas = document.getElementById('mapCanvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const mapImg = document.getElementById('map-img');

    function toggleClans() {
        const cont = document.getElementById('clans-container');
        cont.style.display = cont.style.display === 'block' ? 'none' : 'block';
    }

    function basla() {
        myName = document.getElementById('pName').value.trim();
        if(!myName) return alert("İsimsiz kahraman olmaz!");

        const sel = document.getElementById('pKlan');
        if(sel.value === "YENİ_KLAN") {
            const n = prompt("Klan Adı:");
            myKlan = n ? n.toUpperCase() : "BAĞIMSIZ";
            myColor = `hsl(${Math.floor(Math.random() * 360)}, 70%, 60%)`;
        } else {
            myKlan = sel.value;
            myColor = sel.options[sel.selectedIndex].dataset.color;
        }

        // Kara Bulma Algoritması
        canvas.width = 1500; canvas.height = 800;
        try { ctx.drawImage(mapImg, 0, 0, 1500, 800); } catch(e){}

        let foundLand = false;
        for(let i=0; i<500; i++) {
            let tx = Math.floor(Math.random() * 600) + 50;
            let ty = Math.floor(Math.random() * 300) + 50;
            const p = ctx.getImageData((tx*SIZE/15000)*1500, (ty*SIZE/8000)*800, 1, 1).data;
            if(p[0] > 160) { x = tx; y = ty; foundLand = true; break; }
        }

        document.getElementById('login').style.display = 'none';
        document.getElementById('player').style.display = 'flex';
        document.getElementById('nameTag').innerText = myName;
        document.getElementById('nameTag').style.backgroundColor = myColor;

        updatePosition();
        focusPlayer();
        initSync();
        
        // Cooldown Takipçisi
        setInterval(updateTimerUI, 100);
    }

    function updateTimerUI() {
        const now = Date.now();
        const cd = document.getElementById('pIcon').innerText === "🚢" ? 4000 : 2000;
        const diff = now - lastMoveTime;
        const el = document.getElementById('move-timer');
        if(diff < cd) {
            el.innerText = `BEKLEME: ${Math.ceil((cd-diff)/1000)}s`;
            el.style.color = "#e74c3c";
        } else {
            el.innerText = "HAREKET: HAZIR ✅";
            el.style.color = "#2ecc71";
        }
    }

    function focusPlayer() {
        const vp = document.getElementById('viewport');
        vp.scrollTo((x*SIZE) - (window.innerWidth/2), (y*SIZE) - (window.innerHeight/2));
    }

    async function tryBuild(label, icon) {
        if(document.getElementById('pIcon').innerText === "🚢") {
            addNotif("⚠️ Denize yapı inşa edilemez!", "#e74c3c");
            return;
        }
        
        const bName = prompt(`${label} için isim verin:`);
        if(!bName) return;

        document.getElementById('build-menu').style.display = 'none';
        const dataStr = `${myName}||${myColor}||${bName}`;
        
        // Bildirim Gönder
        broadcastLog(`[${myKlan}] ${myName}, ${x},${y} konumunda <b>${bName}</b> (${icon}) inşa etti!`, myColor);

        await supabaseClient.from('structures').insert([{ owner_name: dataStr, type: icon, x, y }]);
        loadWorld();
    }

    function updatePosition() {
        const p = document.getElementById('player');
        p.style.left = (x * SIZE) + "px";
        p.style.top = (y * SIZE) + "px";
        
        try {
            const pix = ctx.getImageData((x*SIZE/15000)*1500, (y*SIZE/8000)*800, 1, 1).data;
            document.getElementById('pIcon').innerText = (pix[0] < 160 && pix[1] < 160) ? "🚢" : "🏇";
        } catch(e) { document.getElementById('pIcon').innerText = "🏇"; }

        supabaseClient.from('players').upsert({ id: myId, name: myName, klan: myKlan, color: myColor, x, y, last_seen: new Date().toISOString() }).then();
    }

    document.getElementById('map').onclick = function(e) {
        if(e.target.id !== 'map-img') return;
        const now = Date.now();
        const cd = document.getElementById('pIcon').innerText === "🚢" ? 4000 : 2000;
        if(now - lastMoveTime < cd) return;

        const rect = mapImg.getBoundingClientRect();
        const tx = Math.floor(((e.clientX - rect.left)/zoom)/SIZE);
        const ty = Math.floor(((e.clientY - rect.top)/zoom)/SIZE);

        if (tx > x) x++; else if (tx < x) x--;
        else if (ty > y) y++; else if (ty < y) y--;
        
        lastMoveTime = now;
        updatePosition();
    };

    function addNotif(msg, color) {
        const container = document.getElementById('notification-container');
        const n = document.createElement('div');
        n.className = 'notif';
        n.style.borderColor = color;
        n.innerHTML = msg;
        container.appendChild(n);
        setTimeout(() => n.remove(), 5000);
    }

    function broadcastLog(msg, color) {
        addNotif(msg, color);
        supabaseClient.channel('world-events').send({ type: 'broadcast', event: 'log', payload: { msg, color } });
    }

    async function initSync() {
        supabaseClient.channel('world-events').on('broadcast', { event: 'log' }, (p) => addNotif(p.payload.msg, p.payload.color)).subscribe();
        loadWorld();
        setInterval(loadWorld, 5000);
    }

    async function loadWorld() {
        const { data: dbS } = await supabaseClient.from('structures').select('*');
        const { data: dbP } = await supabaseClient.from('players').select('*');
        const mapDiv = document.getElementById('map');

        mapDiv.querySelectorAll('.building, .other-p').forEach(n => n.remove());

        if(dbS) dbS.forEach(s => {
            const p = s.owner_name.split("||");
            const b = document.createElement('div');
            b.className = 'building';
            b.style.left = (s.x*SIZE)+'px'; b.style.top = (s.y*SIZE)+'px';
            b.innerHTML = `<span style="font-size:18px;">${s.type}</span><span class="b-tag" style="color:${p[1]}; border-color:${p[1]}">${p[2]}</span>`;
            mapDiv.appendChild(b);
        });

        const clansContainer = document.getElementById('clans-container');
        clansContainer.innerHTML = '';
        let clanData = {"AVAR":{c:"#2ecc71",m:[]},"DEVLET-İ ALİYYE-İ İSLAM":{c:"#9b59b6",m:[]},"SPARTA":{c:"#ff9800",m:[]},"CRM":{c:"#ff0000",m:[]},"VAMPİRE":{c:"#7f8c8d",m:[]}};

        if(dbP) dbP.forEach(p => {
            if(Date.now() - new Date(p.last_seen).getTime() < 60000) {
                if(!clanData[p.klan]) clanData[p.klan] = {c: p.color, m:[]};
                clanData[p.klan].m.push(p.name);
                
                if(p.id !== myId) {
                    const u = document.createElement('div');
                    u.className = 'other-p'; u.style.position='absolute'; u.style.left=(p.x*SIZE)+'px'; u.style.top=(p.y*SIZE)+'px';
                    u.innerHTML = `<span style="font-size:18px;">🏇</span><span class="name-tag" style="background:${p.color}">${p.name}</span>`;
                    mapDiv.appendChild(u);
                }
            }
        });

        for(let k in clanData) {
            const item = document.createElement('div');
            item.style.marginBottom = "8px";
            item.innerHTML = `<div style="color:${clanData[k].c}; font-size:12px; font-weight:bold;">${k}</div>
                             <div style="color:#aaa; font-size:10px;">${clanData[k].m.length > 0 ? clanData[k].m.join(', ') : 'Üye yok'}</div>`;
            clansContainer.appendChild(item);
        }
    }
</script>
</body>
</html>
