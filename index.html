<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elazığ Cephesi - Komutan</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Segoe UI', Tahoma, sans-serif; overflow: hidden; }
        
        #notification-container {
            position: fixed; top: 15px; right: 15px; width: 260px; z-index: 999;
            display: flex; flex-direction: column; gap: 8px; pointer-events: none;
        }
        .notif {
            background: rgba(0, 0, 0, 0.9); border-left: 5px solid #2ecc71;
            padding: 10px 15px; font-size: 12px; border-radius: 5px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            animation: slideIn 0.3s ease, fadeOut 0.5s 4.5s forwards;
        }

        #ui-top {
            position: fixed; top: 0; width: 100%; background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
            padding: 10px; text-align: center; z-index: 500;
        }

        /* YENİ NESİL KLAN PANELİ */
        #clan-panel {
            position: fixed; left: 15px; top: 15px; z-index: 1000;
        }
        #clan-toggle-btn {
            background: #1a1a1a; border: 2px solid #2ecc71; color: #2ecc71;
            padding: 10px 20px; border-radius: 8px; cursor: pointer;
            font-weight: bold; text-transform: uppercase; letter-spacing: 1px;
            box-shadow: 0 0 15px rgba(46, 204, 113, 0.2); transition: 0.3s;
        }
        #clan-toggle-btn:hover { background: #2ecc71; color: #000; }

        #clan-list {
            display: none; width: 220px; margin-top: 10px;
            background: rgba(10, 10, 10, 0.95); border: 1px solid rgba(46, 204, 113, 0.5);
            padding: 15px; border-radius: 8px;
            max-height: 450px; overflow-y: auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        #zoom-controls {
            position: fixed; bottom: 20px; right: 20px; z-index: 500; display: flex; gap: 10px;
        }
        .zoom-btn { background: #222; border: 2px solid #2ecc71; color: #fff; width: 45px; height: 45px; font-size: 20px; border-radius: 50%; cursor: pointer; }

        #build-menu { 
            position: fixed; left: 50%; top: 50%; transform: translate(-50%, -50%);
            background: rgba(10,10,10,0.98); border: 3px solid #2ecc71; padding: 30px;
            z-index: 1100; display: none; border-radius: 20px; text-align: center;
        }
        .build-btn { display: block; width: 250px; padding: 12px; margin: 10px; background: #1a1a1a; border: 1px solid #2ecc71; color: #fff; cursor: pointer; border-radius: 10px; font-weight: bold; }

        #viewport { width: 100vw; height: 100vh; overflow: auto; background: #000911; }
        #map { width: 15000px; height: 8000px; position: relative; transform-origin: 0 0; }
        #map-img { width: 100%; height: 100%; display: block; opacity: 0.8; }
        
        #player { 
            position: absolute; width: 20px; height: 20px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            z-index: 200; transition: all 0.2s linear; cursor: pointer; 
        }
        
        .building { position: absolute; width: 20px; height: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 50; }
        .build-owner-tag { font-size: 9px; background: rgba(0,0,0,0.85); padding: 2px 5px; border-radius: 3px; white-space: nowrap; border: 1px solid; font-weight: bold; }

        #login { position: fixed; inset: 0; background: radial-gradient(circle, #1a1a1a 0%, #000 100%); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        input, select { padding: 15px; border: 2px solid #2ecc71; background: #111; color: white; margin-bottom: 15px; width: 320px; border-radius: 10px; font-size: 16px; }
        button#start-btn { padding: 15px 60px; background: #2ecc71; color: #000; border: none; font-weight: bold; cursor: pointer; border-radius: 10px; font-size: 18px; }

        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
        @keyframes fadeOut { to { opacity: 0; } }
        canvas { display: none; }
    </style>
</head>
<body>

<canvas id="mapCanvas"></canvas>
<div id="notification-container"></div>

<div id="ui-top">
    <span id="move-timer" style="font-weight:bold; font-size: 1.1em; color:#2ecc71;">HAREKET: HAZIR</span>
</div>

<div id="clan-panel">
    <button id="clan-toggle-btn" onclick="toggleClanList()">🛡️ DEVLETLER / KLANLAR</button>
    <div id="clan-list">
        <div id="clans-container"></div>
    </div>
</div>

<div id="zoom-controls">
    <button class="zoom-btn" onclick="adjustZoom(0.2)">+</button>
    <button class="zoom-btn" onclick="adjustZoom(-0.2)">-</button>
</div>

<div id="build-menu">
    <h2 style="color:#2ecc71; margin-top:0;">YAPI İNŞA ET</h2>
    <button class="build-btn" onclick="startBuild('Köy', '🏡')">Köy (🏡)</button>
    <button class="build-btn" onclick="startBuild('Kale', '🏰')">Kale (🏰)</button>
    <button class="build-btn" onclick="startBuild('Şehir', '🏯')">Şehir (🏯)</button>
    <button class="build-btn" onclick="startBuild('Liman', '⚓')">Liman (⚓)</button>
    <button onclick="document.getElementById('build-menu').style.display='none'" style="margin-top:10px; color:red; background:none; border:none; cursor:pointer;">KAPAT</button>
</div>

<div id="login">
    <h1 style="color: #2ecc71; letter-spacing: 5px;">ELAZIĞ CEPHESİ</h1>
    <input type="text" id="pName" placeholder="Kahraman İsmi">
    
    <select id="pKlan">
        <option value="AVAR" data-color="#2ecc71">AVAR (Yeşil)</option>
        <option value="DEVLET-İ ALİYYE-İ İSLAM" data-color="#9b59b6">DEVLET-İ ALİYYE-İ İSLAM (Mor)</option>
        <option value="VAMPİRE" data-color="#696969">VAMPİRE (Füme)</option>
        <option value="SPARTA" data-color="#ff8c00">SPARTA (Turuncu)</option>
        <option value="CRM" data-color="#ff0000">CRM (Kırmızı)</option>
        <option value="NOR" data-color="#800000">NOR (Bordo)</option>
        <option value="NEW_CLAN">➕ Klan Oluştur...</option>
    </select>
    
    <button id="start-btn" onclick="basla()">SAVAŞI BAŞLAT</button>
</div>

<div id="viewport">
    <div id="map">
        <img id="map-img" src="https://upload.wikimedia.org/wikipedia/commons/e/ec/World_map_blank_without_borders.svg" crossorigin="anonymous">
        <div id="player" style="display:none;" onclick="openBuildMenu()">
            <span id="pIcon" style="font-size:20px;">🏇</span>
            <span id="nameTag" style="font-size:9px; padding:1px 4px; border-radius:3px; font-weight:bold; color:white;"></span>
        </div>
    </div>
</div>

<script>
    const supabaseClient = window.supabase.createClient("https://nfyqinmktmmdurklsred.supabase.co", "Sb_publishable_M6G0bwXo3kkFf9wGY9xz_A_DlDWrvm8");

    let x = 0, y = 0, zoom = 1.0, lastMoveTime = 0;
    let structures = [], localStructures = []; 
    let myId = localStorage.getItem('playerId') || Math.random().toString(36).substr(2, 9);
    localStorage.setItem('playerId', myId);
    let myColor, myKlan, myName;

    const canvas = document.getElementById('mapCanvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const mapImg = document.getElementById('map-img');

    function toggleClanList() {
        const list = document.getElementById('clan-list');
        list.style.display = (list.style.display === 'block') ? 'none' : 'block';
    }

    async function basla() {
        myName = document.getElementById('pName').value.trim();
        const kSelect = document.getElementById('pKlan');
        if(!myName) return alert("İsim girmelisiniz!");

        if(kSelect.value === "NEW_CLAN") {
            const customClan = prompt("Klanınızın adını yazın:");
            if(!customClan) return;
            myKlan = customClan.toUpperCase();
            myColor = `hsl(${Math.floor(Math.random() * 360)}, 70%, 50%)`;
        } else {
            myKlan = kSelect.value;
            myColor = kSelect.options[kSelect.selectedIndex].dataset.color;
        }

        canvas.width = 1500; canvas.height = 800;
        ctx.drawImage(mapImg, 0, 0, 1500, 800);

        // Başlangıç konumu (Kara parçası bulana kadar)
        while(true) {
            x = Math.floor(Math.random() * 600) + 50;
            y = Math.floor(Math.random() * 300) + 50;
            const pix = ctx.getImageData((x * 20 / 15000) * 1500, (y * 20 / 8000) * 800, 1, 1).data;
            if(!(pix[0] < 150 && pix[1] < 150 && pix[2] < 150)) break;
        }

        document.getElementById('login').style.display = 'none';
        document.getElementById('player').style.display = 'flex';
        document.getElementById('nameTag').innerText = myName;
        document.getElementById('nameTag').style.backgroundColor = myColor;
        
        updateUnit();
        initMultiplayer();
    }

    async function startBuild(typeLabel, icon) {
        const allStructures = [...structures, ...localStructures];
        const tooClose = allStructures.some(s => Math.abs(s.x - x) < 20 && Math.abs(s.y - y) < 20);
        
        if(tooClose) {
            addNotification("⚠️ Çok Yakın! En az 20 kare mesafe bırakmalısın.", "red");
            return;
        }

        const bName = prompt("Yapı ismi:");
        if(!bName) return;

        const saveString = `${myName}||${myColor}||${bName}`;
        localStructures.push({ x, y, type: icon, owner_name: saveString });
        renderBuildings();
        
        await supabaseClient.from('structures').insert([{ owner_name: saveString, type: icon, x: x, y: y }]);
        document.getElementById('build-menu').style.display = 'none';
    }

    function updateUnit() {
        const p = document.getElementById('player');
        p.style.left = (x * 20) + "px"; p.style.top = (y * 20) + "px";
        supabaseClient.from('players').upsert({ id: myId, name: myName, klan: myKlan, color: myColor, x: x, y: y, last_seen: new Date().toISOString() }).then();
    }

    document.getElementById('map').onclick = function(e) {
        if(e.target.id !== 'map-img') return;
        const rect = mapImg.getBoundingClientRect();
        const tx = Math.floor(((e.clientX - rect.left) / zoom) / 20);
        const ty = Math.floor(((e.clientY - rect.top) / zoom) / 20);
        
        if(Date.now() - lastMoveTime < 2000) return;
        if (tx > x) x++; else if (tx < x) x--; else if (ty > y) y++; else if (ty < y) y--;
        lastMoveTime = Date.now();
        updateUnit();
    };

    function addNotification(msg, color) {
        const container = document.getElementById('notification-container');
        const n = document.createElement('div');
        n.className = 'notif'; n.style.borderColor = color; n.innerHTML = msg;
        container.appendChild(n);
        setTimeout(() => n.remove(), 5000);
    }

    async function initMultiplayer() {
        loadWorldData();
        setInterval(loadWorldData, 4000);
    }

    function renderBuildings() {
        const mapDiv = document.getElementById('map');
        Array.from(mapDiv.querySelectorAll('.building')).forEach(c => c.remove());
        [...structures, ...localStructures].forEach(s => {
            const data = s.owner_name.split("||");
            const b = document.createElement('div');
            b.className = 'building';
            b.style.left = (s.x * 20) + "px"; b.style.top = (s.y * 20) + "px";
            b.innerHTML = `<span style="font-size:20px;">${s.type}</span><span class="build-owner-tag" style="color:${data[1]}; border-color:${data[1]}">${data[2]}</span>`;
            mapDiv.appendChild(b);
        });
    }

    async function loadWorldData() {
        const { data: dbStr } = await supabaseClient.from('structures').select('*');
        const { data: dbPlr } = await supabaseClient.from('players').select('*');
        if(dbStr) {
            structures = dbStr;
            renderBuildings();
        }

        const clansContainer = document.getElementById('clans-container');
        clansContainer.innerHTML = '';
        const clans = {
            "AVAR": { color: "#2ecc71", members: [] },
            "DEVLET-İ ALİYYE-İ İSLAM": { color: "#9b59b6", members: [] },
            "VAMPİRE": { color: "#696969", members: [] },
            "SPARTA": { color: "#ff8c00", members: [] },
            "CRM": { color: "#ff0000", members: [] },
            "NOR": { color: "#800000", members: [] }
        };

        if(dbPlr) {
            dbPlr.forEach(p => {
                if(Date.now() - new Date(p.last_seen).getTime() < 120000) {
                    if(!clans[p.klan]) clans[p.klan] = { color: p.color, members: [] };
                    clans[p.klan].members.push(p.name);
                }
                // Diğer oyuncuları haritada göster
                if(p.id !== myId && Date.now() - new Date(p.last_seen).getTime() < 120000) {
                    const id = `other-${p.id}`;
                    let other = document.getElementById(id);
                    if(!other) {
                        other = document.createElement('div');
                        other.id = id; other.className = 'building';
                        document.getElementById('map').appendChild(other);
                    }
                    other.style.left = (p.x * 20) + "px"; other.style.top = (p.y * 20) + "px";
                    other.innerHTML = `<span style="font-size:18px;">🏇</span><span style="background:${p.color}; font-size:7px; padding:1px 2px; border-radius:2px; font-weight:bold;">${p.name}</span>`;
                }
            });
            for (let k in clans) {
                const c = clans[k];
                const d = document.createElement('div');
                d.style.marginBottom = "8px";
                d.innerHTML = `<div style="color:${c.color}; font-size:12px; font-weight:bold;">${k}</div>
                               <div style="color:#aaa; font-size:10px;">${c.members.length ? c.members.join(', ') : '<i>Üye yok</i>'}</div>`;
                clansContainer.appendChild(d);
            }
        }
    }

    function adjustZoom(amount) {
        zoom = Math.min(Math.max(zoom + amount, 0.4), 3.0);
        document.getElementById('map').style.transform = `scale(${zoom})`;
    }
    function openBuildMenu() { document.getElementById('build-menu').style.display = 'block'; }
</script>
</body>
</html>
