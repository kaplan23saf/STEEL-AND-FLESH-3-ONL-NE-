<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elazığ Cephesi - v6.5 Kalıcı</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Segoe UI', Tahoma, sans-serif; overflow: hidden; }
        #notification-container { position: fixed; top: 15px; right: 15px; width: 260px; z-index: 999; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
        .notif { background: rgba(0, 0, 0, 0.9); border-left: 5px solid #2ecc71; padding: 10px 15px; font-size: 12px; border-radius: 5px; animation: slideIn 0.3s ease, fadeOut 0.5s 4.5s forwards; }
        #ui-top { position: fixed; top: 0; width: 100%; background: rgba(0,0,0,0.8); padding: 10px; text-align: center; z-index: 500; border-bottom: 2px solid #2ecc71; }
        #clan-list { position: fixed; left: 15px; top: 60px; width: 200px; background: rgba(15, 15, 15, 0.9); border: 2px solid #2ecc71; padding: 12px; border-radius: 8px; z-index: 1000; max-height: 70vh; overflow-y: auto; }
        #viewport { width: 100vw; height: 100vh; overflow: auto; background: #000911; scroll-behavior: smooth; }
        #map { width: 15000px; height: 8000px; position: relative; transform-origin: 0 0; }
        #map-img { width: 100%; height: 100%; display: block; opacity: 0.8; }
        #player { position: absolute; width: 24px; height: 24px; display: none; flex-direction: column; align-items: center; z-index: 210; transition: all 0.5s linear; cursor: pointer; }
        .other-unit { position: absolute; z-index: 100; display: flex; flex-direction: column; align-items: center; transition: all 1.9s linear; pointer-events: none; }
        #login { position: fixed; inset: 0; background: #000; z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        input, select { padding: 15px; border: 2px solid #2ecc71; background: #111; color: white; margin-bottom: 15px; width: 320px; border-radius: 10px; }
        button#start-btn { padding: 15px 60px; background: #2ecc71; color: #000; border: none; font-weight: bold; cursor: pointer; border-radius: 10px; font-size: 18px; }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
        @keyframes fadeOut { to { opacity: 0; } }
        canvas { display: none; }
    </style>
</head>
<body>

<canvas id="mapCanvas"></canvas>
<div id="notification-container"></div>
<div id="ui-top"><span id="move-timer">ORDU HAZIR</span></div>
<div id="clan-list"><h3 style="color:#2ecc71; font-size:14px; margin:0;">KLANLAR</h3><div id="clans-container"></div></div>

<div id="login">
    <h1 style="color: #2ecc71;">ELAZIĞ CEPHESİ</h1>
    <p id="welcome-back" style="display:none; color:#aaa;">Tekrar hoş geldin, Komutan.</p>
    <input type="text" id="pName" placeholder="Kahraman İsmi">
    <select id="pKlan">
        <option value="AVAR" data-color="#2ecc71">AVAR</option>
        <option value="Devleti Aliyye İslam" data-color="#9b59b6">Devleti Aliyye İslam</option>
        <option value="SPARTA" data-color="#e74c3c">SPARTA</option>
    </select>
    <button id="start-btn" onclick="basla()">SAVAŞI BAŞLAT</button>
</div>

<div id="viewport">
    <div id="map">
        <img id="map-img" src="https://upload.wikimedia.org/wikipedia/commons/e/ec/World_map_blank_without_borders.svg" crossorigin="anonymous">
        <div id="player">
            <span id="pIcon" style="font-size:24px;">🏇</span>
            <span id="nameTag" style="font-size:10px; padding:2px 6px; border-radius:4px; font-weight:bold; color:#fff;"></span>
        </div>
    </div>
</div>

<script>
    const supabaseClient = window.supabase.createClient("https://nfyqinmktmmdurklsred.supabase.co", "Sb_publishable_M6G0bwXo3kkFf9wGY9xz_A_DlDWrvm8");

    let x = 0, y = 0, SIZE = 20, zoom = 1.0, lastMoveTime = 0;
    let myId = localStorage.getItem('playerId') || Math.random().toString(36).substr(2, 9);
    localStorage.setItem('playerId', myId);

    const canvas = document.getElementById('mapCanvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const mapImg = document.getElementById('map-img');

    // Önceki verileri kontrol et
    async function checkExistingPlayer() {
        const { data } = await supabaseClient.from('players').select('*').eq('id', myId).single();
        if(data) {
            document.getElementById('pName').value = data.name;
            document.getElementById('pKlan').value = data.klan;
            document.getElementById('welcome-back').style.display = 'block';
            x = data.x; y = data.y;
        }
    }
    checkExistingPlayer();

    function basla() {
        const myName = document.getElementById('pName').value.trim();
        const kSelect = document.getElementById('pKlan');
        if(!myName) return alert("İsim gerekli!");

        const myKlan = kSelect.value;
        const myColor = kSelect.options[kSelect.selectedIndex].dataset.color;

        canvas.width = 1500; canvas.height = 800;
        ctx.drawImage(mapImg, 0, 0, 1500, 800);

        // Eğer yeni oyuncuysa rastgele karada başlat, eskiyse yerinde kalsın
        if(x === 0 && y === 0) {
            while(true) {
                let rx = Math.floor(Math.random() * 600) + 50;
                let ry = Math.floor(Math.random() * 300) + 50;
                const pix = ctx.getImageData((rx * SIZE / 15000) * 1500, (ry * SIZE / 8000) * 800, 1, 1).data;
                if(!(pix[0] < 160 && pix[1] < 160 && pix[2] < 160)) { x = rx; y = ry; break; }
            }
        }

        document.getElementById('login').style.display = 'none';
        const p = document.getElementById('player');
        p.style.display = 'flex';
        document.getElementById('nameTag').innerText = myName;
        document.getElementById('nameTag').style.backgroundColor = myColor;
        
        updateUnit(true); // Girişte veritabanına yaz
        initMultiplayer();
    }

    function updateUnit(forceUpdate = false) {
        const p = document.getElementById('player');
        p.style.left = (x * SIZE) + "px";
        p.style.top = (y * SIZE) + "px";
        
        const pix = ctx.getImageData((x * SIZE / 15000) * 1500, (y * SIZE / 8000) * 800, 1, 1).data;
        const isSea = (pix[0] < 160 && pix[1] < 160 && pix[2] < 160);
        document.getElementById('pIcon').innerText = isSea ? "🚢" : "🏇";
        
        // Hareket eder etmez veritabanını güncelle
        supabaseClient.from('players').upsert({ 
            id: myId, 
            name: document.getElementById('pName').value, 
            klan: document.getElementById('pKlan').value, 
            color: document.getElementById('pKlan').options[document.getElementById('pKlan').selectedIndex].dataset.color, 
            x: x, 
            y: y, 
            last_seen: new Date().toISOString() 
        }).then();

        const vp = document.getElementById('viewport');
        vp.scrollTo((x * SIZE) - (window.innerWidth / 2), (y * SIZE) - (window.innerHeight / 2));
    }

    document.getElementById('map').onclick = function(e) {
        if(e.target.id !== 'map-img') return;
        const rect = mapImg.getBoundingClientRect();
        const tx = Math.floor(((e.clientX - rect.left) / zoom) / SIZE);
        const ty = Math.floor(((e.clientY - rect.top) / zoom) / SIZE);
        
        const now = Date.now();
        if(now - lastMoveTime < 1000) return;

        if (tx > x) x++; else if (tx < x) x--;
        else if (ty > y) y++; else if (ty < y) y--;
        else return;

        lastMoveTime = now;
        updateUnit();
    };

    async function loadWorldData() {
        const { data: players } = await supabaseClient.from('players').select('*');
        const container = document.getElementById('clans-container');
        const mapDiv = document.getElementById('map');
        
        let clans = {};
        if(players) {
            players.forEach(p => {
                // Diğer oyuncuları çiz (Çıksalar bile veritabanında oldukları için silinmezler)
                if(p.id !== myId) {
                    let u = document.getElementById('unit-' + p.id);
                    if(!u) {
                        u = document.createElement('div');
                        u.id = 'unit-' + p.id;
                        u.className = 'other-unit';
                        u.innerHTML = `<span style="font-size:24px;">🏇</span><span style="background:${p.color}; font-size:9px; padding:2px; border-radius:3px;">${p.name}</span>`;
                        mapDiv.appendChild(u);
                    }
                    u.style.left = (p.x * SIZE) + "px";
                    u.style.top = (p.y * SIZE) + "px";
                }
                // Klan listesi güncelleme
                if(!clans[p.klan]) clans[p.klan] = [];
                clans[p.klan].push(p.name);
            });

            container.innerHTML = '';
            for(let k in clans) {
                container.innerHTML += `<p style="margin:5px 0; font-size:12px;"><b style="color:#2ecc71">${k}:</b> ${clans[k].join(', ')}</p>`;
            }
        }
    }

    function initMultiplayer() {
        loadWorldData();
        setInterval(loadWorldData, 2000); // 2 saniyede bir herkesi senkronize et
    }
</script>
</body>
</html>
