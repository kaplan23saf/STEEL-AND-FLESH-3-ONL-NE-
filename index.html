<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Savaş Odası - Canlı</title>
    <style>
        body { margin: 0; background: #1a1a1a; color: #ebc26a; font-family: sans-serif; overflow: hidden; }
        #login { position: fixed; inset: 0; background: #000; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        input { padding: 12px; border: 2px solid #ebc26a; background: #222; color: white; margin-bottom: 10px; width: 200px; }
        button { padding: 10px 20px; background: #ebc26a; border: none; font-weight: bold; cursor: pointer; }
        
        #ui { position: fixed; top: 0; width: 100%; background: rgba(0,0,0,0.9); padding: 10px; text-align: center; border-bottom: 2px solid #ebc26a; z-index: 10; }
        
        /* Harita Kutusu */
        #viewport { width: 100vw; height: 100vh; overflow: auto; position: relative; background: #222; }
        #map { 
            width: 5000px; height: 2500px; 
            background-image: url('https://www.transparenttextures.com/patterns/dark-matter.png'); /* Geçici belirgin desen */
            position: relative; 
        }

        /* Oyuncu */
        .unit { 
            position: absolute; width: 60px; height: 60px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 5;
        }
        .unit-icon { font-size: 40px; text-shadow: 0 0 10px gold; }
        .unit-name { font-size: 12px; background: black; padding: 2px 5px; border: 1px solid gold; border-radius: 4px; }
    </style>
</head>
<body>

<div id="login">
    <h1>KOMUTAN GİRİŞİ</h1>
    <input type="text" id="pName" placeholder="Adınız">
    <button onclick="basla()">GİRİŞ YAP</button>
</div>

<div id="ui">
    <div id="msg">Atı yürütmek için yanındaki boşluğa dokun!</div>
    <div id="coords">Konum: --, --</div>
</div>

<div id="viewport">
    <div id="map">
        <div id="player" class="unit" style="display:none;">
            <span class="unit-icon">🏇</span>
            <span id="nameTag" class="unit-name"></span>
        </div>
    </div>
</div>

<script>
    let x = 20, y = 20; // Kaybolmamak için daha yakın bir noktada başlatıyoruz
    const SIZE = 60;

    function basla() {
        const name = document.getElementById('pName').value;
        if(!name) return;
        document.getElementById('nameTag').innerText = name;
        document.getElementById('login').style.display = 'none';
        document.getElementById('player').style.display = 'flex';
        ciz();
    }

    function ciz() {
        const p = document.getElementById('player');
        p.style.left = (x * SIZE) + "px";
        p.style.top = (y * SIZE) + "px";
        document.getElementById('coords').innerText = `Konum: ${x}, ${y}`;
        
        // EKRANI OYUNCUYA KAYDIR (Sihirli dokunuş!)
        p.scrollIntoView({ behavior: 'smooth', block: 'center', inline: 'center' });
    }

    document.getElementById('map').onclick = function(e) {
        const tx = Math.floor(e.offsetX / SIZE);
        const ty = Math.floor(e.offsetY / SIZE);

        if(Math.abs(tx - x) + Math.abs(ty - y) === 1) {
            x = tx; y = ty;
            ciz();
        }
    };
</script>

</body>
</html>
