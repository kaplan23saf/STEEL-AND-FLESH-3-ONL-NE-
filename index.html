<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elazığ Cephesi - Komutan</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Segoe UI', Tahoma, sans-serif; overflow: hidden; }
        #notification-container { position: fixed; top: 15px; right: 15px; width: 260px; z-index: 999; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
        .notif { background: rgba(0, 0, 0, 0.9); border-left: 5px solid #2ecc71; padding: 10px 15px; font-size: 12px; border-radius: 5px; animation: slideIn 0.3s ease, fadeOut 0.5s 4.5s forwards; }
        #ui-top { position: fixed; top: 0; width: 100%; background: rgba(0,0,0,0.8); padding: 10px; text-align: center; z-index: 500; border-bottom: 2px solid #2ecc71; }
        #clan-list { position: fixed; left: 15px; top: 60px; width: 200px; background: rgba(10, 10, 10, 0.9); border: 1px solid #2ecc71; padding: 10px; border-radius: 8px; z-index: 500; }
        #clan-toggle-btn { width: 100%; background: #111; color: #2ecc71; border: 1px solid #2ecc71; padding: 8px; cursor: pointer; font-weight: bold; }
        #clans-container { margin-top: 10px; max-height: 400px; overflow-y: auto; display: none; }
        #zoom-controls { position: fixed; bottom: 20px; right: 20px; z-index: 500; display: flex; gap: 10px; }
        .zoom-btn { background: #222; border: 2px solid #2ecc71; color: #fff; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; }
        #viewport { width: 100vw; height: 100vh; overflow: auto; background: #000911; }
        #map { width: 15000px; height: 8000px; position: relative; transform-origin: 0 0; }
        #map-img { width: 100%; height: 100%; display: block; opacity: 0.8; }
        #player { position: absolute; width: 20px; height: 20px; display: none; flex-direction: column; align-items: center; z-index: 200; cursor: pointer; }
        #login { position: fixed; inset: 0; background: #1a1a1a; z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        input, select { padding: 15px; border: 2px solid #2ecc71; background: #111; color: white; margin-bottom: 10px; width: 300px; border-radius: 8px; }
        button#start-btn { padding: 15px 50px; background: #2ecc71; color: #000; border: none; font-weight: bold; cursor: pointer; border-radius: 8px; font-size: 18px; }
        .building { position: absolute; width: 20px; height: 20px; display: flex; flex-direction: column; align-items: center; z-index: 50; }
        .build-owner-tag { font-size: 9px; background: rgba(0,0,0,0.8); padding: 2px; border-radius: 3px; border: 1px solid; }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
        @keyframes fadeOut { to { opacity: 0; } }
        canvas { display: none; }
    </style>
</head>
<body>

<canvas id="mapCanvas"></canvas>
<div id="notification-container"></div>
<div id="ui-top"><span id="move-timer">HAREKET: HAZIR</span></div>
<div id="clan-list">
    <button id="clan-toggle-btn" onclick="toggleClanList()">📜 KLANLAR LİSTESİ</button>
    <div id="clans-container"></div>
</div>

<div id="login">
    <h1 style="color: #2ecc71; margin-bottom:20px;">ELAZIĞ CEPHESİ</h1>
    <input type="text" id="pName" placeholder="Kahraman İsmi">
    <select id="pKlan" onchange="checkCustomClan()">
        <option value="AVAR" data-color="#2ecc71">AVAR</option>
        <option value="DEVLET-İ ALİYYE-İ İSLAM" data-color="#9b59b6">DEVLET-İ ALİYYE-İ İSLAM</option>
        <option value="SPARTA" data-color="#e67e22">SPARTA</option>
        <option value="CRM" data-color="#e74c3c">CRM</option>
        <option value="VAMPİRE" data-color="#555555">VAMPİRE</option>
        <option value="NEW_CLAN">➕ Yeni Klan Oluştur...</option>
    </select>
    <input type="text" id="pNewClanName" placeholder="Yeni Klanın Adı" style="display:none; border-color:#f1c40f;">
    <button id="start-btn" onclick="basla()">SAVAŞI BAŞLAT</button>
</div>

<div id="viewport">
    <div id="map">
        <img id="map-img" src="https://upload.wikimedia.org/wikipedia/commons/e/ec/World_map_blank_without_borders.svg" crossorigin="anonymous">
        <div id="player">
            <span id="pIcon" style="font-size:18px;">🏇</span>
            <span id="nameTag" style="font-size:9px; padding:2px; border-radius:3px;"></span>
        </div>
    </div>
</div>

<script>
    const supabaseClient = window.supabase.createClient("https://nfyqinmktmmdurklsred.supabase.co", "Sb_publishable_M6G0bwXo3kkFf9wGY9xz_A_DlDWrvm8");

    let x = 100, y = 100;
    const SIZE = 20; 
    let zoom = 1.0; 
    let lastMoveTime = 0;
    let localStructures = []; 
    let myId = localStorage.getItem('playerId') || Math.random().toString(36).substr(2, 9);
    localStorage.setItem('playerId', myId);
    let myColor, myKlan, myName;

    const canvas = document.getElementById('mapCanvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const mapImg = document.getElementById('map-img');

    function toggleClanList() {
        const c = document.getElementById('clans-container');
        c.style.display = (c.style.display === 'none' || c.style.display === '') ? 'block' : 'none';
    }

    function checkCustomClan() {
        const sel = document.getElementById('pKlan');
        document.getElementById('pNewClanName').style.display = (sel.value === "NEW_CLAN") ? "block" : "none";
    }

    function basla() {
        console.log("Savaş başlatma tetiklendi...");
        myName = document.getElementById('pName').value.trim();
        const kSelect = document.getElementById('pKlan');
        const customClanInput = document.getElementById('pNewClanName').value.trim();
        
        if(!myName) return alert("Lütfen ismini gir!");

        if(kSelect.value === "NEW_CLAN") {
            if(!customClanInput) return alert("Klan adı gir!");
            myKlan = customClanInput;
            myColor = `hsl(${Math.floor(Math.random() * 360)}, 70%, 50%)`;
        } else {
            myKlan = kSelect.value;
            myColor = kSelect.options[kSelect.selectedIndex].dataset.color;
        }

        // Haritayı canvasa çekmeyi dene
        try {
            canvas.width = 1500; canvas.height = 800;
            ctx.drawImage(mapImg, 0, 0, 1500, 800);
            
            // Spawn noktası bul (Hata verirse default 100,50 kalır)
            let found = false;
            for(let i=0; i<50; i++) {
                let rx = Math.floor(Math.random() * 500) + 100;
                let ry = Math.floor(Math.random() * 200) + 100;
                const pix = ctx.getImageData((rx * SIZE / 15000) * 1500, (ry * SIZE / 8000) * 800, 1, 1).data;
                if(pix[0] > 150) { x = rx; y = ry; found = true; break; }
            }
        } catch(e) {
            console.warn("Harita tarama hatası, güvenli iniş yapılıyor...");
            x = 100; y = 50; 
        }

        document.getElementById('login').style.display = 'none';
        document.getElementById('player').style.display = 'flex';
        document.getElementById('nameTag').innerText = myName;
        document.getElementById('nameTag').style.backgroundColor = myColor;
        
        updateUnit();
        initMultiplayer();
    }

    function updateUnit() {
        const p = document.getElementById('player');
        p.style.left = (x * SIZE) + "px";
        p.style.top = (y * SIZE) + "px";
        
        // Deniz kontrolü (Güvenli mod)
        let isSea = false;
        try {
            const pix = ctx.getImageData((x * SIZE / 15000) * 1500, (y * SIZE / 8000) * 800, 1, 1).data;
            if(pix[0] < 100 && pix[1] < 100 && pix[2] > 100) isSea = true;
        } catch(e) {}
        
        document.getElementById('pIcon').innerText = isSea ? "🚢" : "🏇";
        
        supabaseClient.from('players').upsert({ id: myId, name: myName, klan: myKlan, color: myColor, x: x, y: y, last_seen: new Date().toISOString() }).then();
        
        const vp = document.getElementById('viewport');
        vp.scrollTo((x * SIZE) - (window.innerWidth / 2), (y * SIZE) - (window.innerHeight / 2));
    }

    document.getElementById('map').onclick = function(e) {
        if(e.target.id !== 'map-img') return;
        const rect = mapImg.getBoundingClientRect();
        const tx = Math.floor(((e.clientX - rect.left) / zoom) / SIZE);
        const ty = Math.floor(((e.clientY - rect.top) / zoom) / SIZE);
        
        const now = Date.now();
        if(now - lastMoveTime < 1000) return;

        if (tx > x) x++; else if (tx < x) x--;
        if (ty > y) y++; else if (ty < y) y--;

        lastMoveTime = now;
        updateUnit();
    };

    async function initMultiplayer() {
        loadWorldData();
        setInterval(loadWorldData, 5000);
    }

    async function loadWorldData() {
        const { data: dbPlayers } = await supabaseClient.from('players').select('*');
        const mapDiv = document.getElementById('map');
        Array.from(mapDiv.querySelectorAll('.other-unit')).forEach(u => u.remove());

        const clans = { "AVAR": { color: "#2ecc71", m: [] }, "DEVLET-İ ALİYYE-İ İSLAM": { color: "#9b59b6", m: [] }, "SPARTA": { color: "#e67e22", m: [] }, "CRM": { color: "#e74c3c", m: [] }, "VAMPİRE": { color: "#555555", m: [] } };

        if(dbPlayers) {
            dbPlayers.forEach(p => {
                const active = (Date.now() - new Date(p.last_seen).getTime() < 60000);
                if(active) {
                    if(!clans[p.klan]) clans[p.klan] = { color: p.color, m: [] };
                    clans[p.klan].m.push(p.name);
                    
                    if(p.id !== myId) {
                        const u = document.createElement('div');
                        u.className = 'other-unit';
                        u.style.position = 'absolute'; u.style.left = (p.x * SIZE) + "px"; u.style.top = (p.y * SIZE) + "px";
                        u.innerHTML = `🏇<span style="background:${p.color}; font-size:8px;">${p.name}</span>`;
                        mapDiv.appendChild(u);
                    }
                }
            });

            const container = document.getElementById('clans-container');
            container.innerHTML = '';
            for(let k in clans) {
                const item = document.createElement('div');
                item.innerHTML = `<b style="color:${clans[k].color}">${k}</b><br><small>${clans[k].m.join(', ')}</small><hr>`;
                container.appendChild(item);
            }
        }
    }
</script>
</body>
</html>
