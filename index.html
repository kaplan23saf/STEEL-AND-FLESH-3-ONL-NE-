<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elazığ Strateji - Stabil Sürüm</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        #ui-top { position: fixed; top: 0; width: 100%; background: rgba(0,0,0,0.9); padding: 12px; text-align: center; z-index: 1600; border-bottom: 3px solid #2ecc71; }
        #notification-container { position: fixed; top: 10px; right: 10px; width: 280px; z-index: 2000; pointer-events: none; }
        .notif { background: rgba(0,0,0,0.95); border-right: 5px solid #2ecc71; padding: 10px; font-size: 12px; margin-bottom: 5px; border-radius: 4px; border: 1px solid #333; }
        #viewport { width: 100vw; height: 100vh; overflow: auto; background: #000; scroll-behavior: smooth; }
        #map { width: 15000px; height: 8000px; position: relative; }
        #map-img { width: 100%; height: 100%; display: block; }
        .building { position: absolute; width: 80px; height: 80px; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; pointer-events: none; }
        .build-icon { font-size: 45px; }
        .build-tag { font-size: 10px; background: rgba(0,0,0,0.8); padding: 2px 5px; border-radius: 4px; border: 1px solid; text-align: center; margin-top: 2px; }
        #player { position: absolute; width: 80px; height: 80px; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        #build-menu { position: fixed; left: 50%; top: 50%; transform: translate(-50%, -50%); background: #111; border: 3px solid #2ecc71; padding: 25px; z-index: 2500; display: none; border-radius: 15px; text-align: center; }
        .build-btn { display: block; width: 200px; padding: 12px; margin: 8px; background: #222; border: 1px solid #2ecc71; color: #fff; cursor: pointer; font-weight: bold; border-radius: 8px; }
        #login { position: fixed; inset: 0; background: #000; z-index: 3000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        input, select { padding: 12px; border: 2px solid #2ecc71; background: #111; color: white; margin-bottom: 15px; width: 250px; border-radius: 8px; }
        button#start-btn { padding: 12px 50px; background: #2ecc71; color: #000; border: none; font-weight: bold; cursor: pointer; border-radius: 8px; font-size: 16px; }
        canvas { display: none; }
    </style>
</head>
<body>

<canvas id="mapCanvas"></canvas>
<div id="notification-container"></div>
<div id="ui-top">
    <span id="move-timer" style="font-weight:bold; color:#2ecc71;">HAREKET: HAZIR</span>
    <span id="build-status" style="margin-left:20px; color:#f1c40f;"></span>
</div>

<div id="build-menu">
    <h3 style="color:#2ecc71; margin-top:0;">YAPI İNŞA ET</h3>
    <button class="build-btn" onclick="startBuild('Köy', '🏡', 15)">🏡 Köy (15s)</button>
    <button class="build-btn" onclick="startBuild('Kale', '🏰', 30)">🏰 Kale (30s)</button>
    <button onclick="document.getElementById('build-menu').style.display='none'" style="color:#666; background:none; border:none; cursor:pointer;">VAZGEÇ</button>
</div>

<div id="login">
    <h1 style="color:#2ecc71;">ELAZIĞ STRATEJİ</h1>
    <input type="text" id="pName" placeholder="Karakter İsmi">
    <select id="pKlan">
        <option value="AVAR" data-color="#2ecc71">AVAR KLANLI</option>
        <option value="D.A.İ" data-color="#9b59b6">D.A.İ KLANLI</option>
        <option value="SPARTA" data-color="#e74c3c">SPARTA KLANLI</option>
        <option value="NOR" data-color="#ffc0cb">NOR KLANLI</option>
    </select>
    <button id="start-btn" onclick="basla()">SEFERE BAŞLA</button>
</div>

<div id="viewport">
    <div id="map">
        <img id="map-img" src="https://upload.wikimedia.org/wikipedia/commons/e/ec/World_map_blank_without_borders.svg" crossorigin="anonymous">
        <div id="player" style="display:none;" onclick="openBuildMenu()">
            <div style="color:#f1c40f;">▼</div>
            <span id="pIcon" style="font-size:45px;">🏇</span>
            <span id="nameTag" style="font-size:11px; padding:2px 6px; border-radius:4px; font-weight:bold; color:white;"></span>
        </div>
    </div>
</div>

<script>
    const supabaseClient = window.supabase.createClient("https://nfyqinmktmmdurklsred.supabase.co", "Sb_publishable_M6G0bwXo3kkFf9wGY9xz_A_DlDWrvm8");

    let x = 100, y = 50; 
    const SIZE = 80;
    let buildEndTime = 0, lastMoveTime = 0;
    let myName = "", myColor = "", myKlan = "";

    const canvas = document.getElementById('mapCanvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const mapImg = document.getElementById('map-img');

    function basla() {
        const nameVal = document.getElementById('pName').value.trim();
        const klanSel = document.getElementById('pKlan');
        if(!nameVal) return alert("İsimsiz kahraman olmaz!");

        myName = nameVal;
        myKlan = klanSel.value;
        myColor = klanSel.options[klanSel.selectedIndex].dataset.color;

        document.getElementById('login').style.display = 'none';
        document.getElementById('player').style.display = 'flex';
        document.getElementById('nameTag').innerText = `[${myKlan}] ${myName}`;
        document.getElementById('nameTag').style.background = myColor;

        canvas.width = 1500; canvas.height = 800;
        ctx.drawImage(mapImg, 0, 0, 1500, 800);
        
        updateUnit();
        initSystems();
    }

    function checkIsSea(cx, cy) {
        const pix = ctx.getImageData((cx * SIZE / 15000) * 1500, (cy * SIZE / 8000) * 800, 1, 1).data;
        return (pix[0] < 150 && pix[1] < 150 && pix[2] < 150);
    }

    function openBuildMenu() {
        if (Date.now() < buildEndTime) return;
        document.getElementById('build-menu').style.display = 'block';
    }

    async function startBuild(label, icon, sec) {
        if(checkIsSea(x, y)) return addNotification("⚠️ Denizde inşaat yapılamaz!", "red");

        const { data: dbData } = await supabaseClient.from('structures').select('x, y');
        const tooClose = dbData?.some(s => {
            const dx = Math.abs(Math.floor(s.x) - Math.floor(x));
            const dy = Math.abs(Math.floor(s.y) - Math.floor(y));
            return (dx === 0 && dy === 0) ? false : (dx < 5 && dy < 5);
        });

        if(tooClose) return addNotification("⚠️ Çok yakın! (En az 5 kare mesafe)", "orange");

        const bTitle = prompt("Yapı Adı:");
        if(!bTitle) return;

        document.getElementById('build-menu').style.display = 'none';
        buildEndTime = Date.now() + (sec * 1000);

        const saveStr = `${myName}||${myColor}||${bTitle}`;
        const { data: nBuild } = await supabaseClient.from('structures').insert({
            owner_name: saveStr,
            type: '🏗️', // İNŞAAT VİNCİ
            x: Math.floor(x),
            y: Math.floor(y)
        }).select();

        if(nBuild && nBuild[0]) {
            addNotification(`🏗️ ${bTitle} inşaatı başladı...`, "cyan");
            setTimeout(async () => {
                await supabaseClient.from('structures').update({ type: icon }).eq('id', nBuild[0].id);
                addNotification(`✅ ${bTitle} tamamlandı!`, "#2ecc71");
                loadData();
            }, sec * 1000);
        }
    }

    function updateUnit() {
        const p = document.getElementById('player');
        p.style.left = (x * SIZE) + "px"; p.style.top = (y * SIZE) + "px";
        document.getElementById('pIcon').innerText = checkIsSea(x, y) ? "🚢" : "🏇";
        const vp = document.getElementById('viewport');
        vp.scrollTo((x * SIZE) - (window.innerWidth / 2), (y * SIZE) - (window.innerHeight / 2));
    }

    document.getElementById('map').onclick = function(e) {
        if(e.target.id !== 'map-img') return;
        const tx = Math.floor(e.offsetX / SIZE);
        const ty = Math.floor(e.offsetY / SIZE);
        if(Math.abs(tx - x) + Math.abs(ty - y) === 1) {
            const cd = checkIsSea(x, y) ? 8000 : 4000;
            if(Date.now() - lastMoveTime < cd) return;
            x = tx; y = ty; lastMoveTime = Date.now();
            updateUnit();
        }
    };

    async function loadData() {
        const { data: list } = await supabaseClient.from('structures').select('*');
        const mapDiv = document.getElementById('map');
        mapDiv.querySelectorAll('.building').forEach(b => b.remove());

        list?.forEach(s => {
            const p = s.owner_name.split("||");
            const bEl = document.createElement('div');
            bEl.className = 'building';
            bEl.style.left = (s.x * SIZE) + "px"; bEl.style.top = (s.y * SIZE) + "px";
            bEl.innerHTML = `<span class="build-icon">${s.type}</span><span class="build-tag" style="color:${p[1]}; border-color:${p[1]}">${p[0]}<br><b>${p[2]}</b></span>`;
            mapDiv.appendChild(bEl);
        });
    }

    function addNotification(text, color) {
        const container = document.getElementById('notification-container');
        const div = document.createElement('div');
        div.className = 'notif'; div.style.borderRightColor = color; div.innerText = text;
        container.appendChild(div);
        setTimeout(() => div.remove(), 5000);
    }

    function initSystems() {
        loadData();
        setInterval(loadData, 5000);

            const cd =
