<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elazığ Strateji - Kesin Çözüm</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        #ui-top { position: fixed; top: 0; width: 100%; background: rgba(0,0,0,0.9); padding: 12px; text-align: center; z-index: 1600; border-bottom: 2px solid #2ecc71; }
        #notification-container { position: fixed; top: 10px; right: 10px; width: 280px; z-index: 2000; pointer-events: none; }
        .notif { background: rgba(0,0,0,0.95); border-right: 5px solid #2ecc71; padding: 10px; font-size: 12px; margin-bottom: 5px; border-radius: 4px; border: 1px solid #333; }
        
        #viewport { width: 100vw; height: 100vh; overflow: auto; background: #000; scroll-behavior: smooth; }
        #map { width: 15000px; height: 8000px; position: relative; }
        #map-img { width: 100%; height: 100%; display: block; }

        /* YAPI VE OYUNCU KATMANLARI */
        .building { position: absolute; width: 80px; height: 80px; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; pointer-events: none; }
        .build-icon { font-size: 50px; filter: drop-shadow(0 0 5px rgba(0,0,0,0.5)); }
        .build-tag { font-size: 10px; background: rgba(0,0,0,0.8); padding: 2px 5px; border-radius: 4px; border: 1px solid; text-align: center; margin-top: 2px; }
        
        #player { position: absolute; width: 80px; height: 80px; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; transition: 0.3s ease-out; cursor: pointer; }
        
        #build-menu { position: fixed; left: 50%; top: 50%; transform: translate(-50%, -50%); background: #111; border: 3px solid #2ecc71; padding: 30px; z-index: 2500; display: none; border-radius: 20px; box-shadow: 0 0 50px rgba(0,0,0,1); }
        .build-btn { display: block; width: 200px; padding: 15px; margin: 10px; background: #222; border: 1px solid #2ecc71; color: #fff; cursor: pointer; font-weight: bold; border-radius: 10px; }
        .build-btn:hover { background: #2ecc71; color: #000; }
        
        #login { position: fixed; inset: 0; background: #000; z-index: 3000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        input { padding: 15px; border: 2px solid #2ecc71; background: #111; color: white; border-radius: 10px; width: 250px; margin-bottom: 20px; }
        canvas { display: none; }
    </style>
</head>
<body>

<canvas id="mapCanvas"></canvas>
<div id="notification-container"></div>
<div id="ui-top">
    <span id="move-timer" style="font-weight:bold; color:#2ecc71;">HAREKET: HAZIR</span>
    <span id="build-status" style="margin-left:20px; color:#f1c40f; font-weight:bold;"></span>
</div>

<div id="build-menu">
    <h2 style="color:#2ecc71; margin-top:0;">YAPI SEÇİMİ</h2>
    <button class="build-btn" onclick="startBuild('Köy', '🏡', 15)">🏡 KÖY (15s)</button>
    <button class="build-btn" onclick="startBuild('Kale', '🏰', 30)">🏰 KALE (30s)</button>
    <button onclick="document.getElementById('build-menu').style.display='none'" style="margin-top:10px; background:none; border:none; color:#666; cursor:pointer;">İPTAL</button>
</div>

<div id="login">
    <h1 style="color:#2ecc71; letter-spacing: 5px;">ELAZIĞ STRATEJİ</h1>
    <input type="text" id="pName" placeholder="KOMUTAN ADI">
    <button onclick="basla()" style="padding:15px 50px; background:#2ecc71; border:none; font-weight:bold; border-radius:10px; cursor:pointer;">ORDUYU YÖNET</button>
</div>

<div id="viewport">
    <div id="map">
        <img id="map-img" src="https://upload.wikimedia.org/wikipedia/commons/e/ec/World_map_blank_without_borders.svg" crossorigin="anonymous">
        <div id="player" style="display:none;" onclick="openBuildMenu()">
            <div style="color:#f1c40f; font-size:20px; animation: bounce 1s infinite;">▼</div>
            <span style="font-size:50px;">🏇</span>
            <span id="nameTag" style="font-size:12px; padding:3px 8px; border-radius:5px; font-weight:bold; color:white;"></span>
        </div>
    </div>
</div>

<script>
    const supabaseClient = window.supabase.createClient("https://nfyqinmktmmdurklsred.supabase.co", "Sb_publishable_M6G0bwXo3kkFf9wGY9xz_A_DlDWrvm8");

    let x = 100, y = 50; 
    const SIZE = 80;
    let buildEndTime = 0, lastMoveTime = 0;
    let myName = "Komutan", myColor = "#2ecc71";

    const canvas = document.getElementById('mapCanvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const mapImg = document.getElementById('map-img');

    function basla() {
        myName = document.getElementById('pName').value.trim() || "Bilinmeyen";
        document.getElementById('login').style.display = 'none';
        document.getElementById('player').style.display = 'flex';
        document.getElementById('nameTag').innerText = myName;
        document.getElementById('nameTag').style.background = myColor;

        canvas.width = 1500; canvas.height = 800;
        ctx.drawImage(mapImg, 0, 0, 1500, 800);
        
        updateUnit();
        initSystems();
    }

    function checkIsSea(cx, cy) {
        const pix = ctx.getImageData((cx * SIZE / 15000) * 1500, (cy * SIZE / 8000) * 800, 1, 1).data;
        return (pix[0] < 150 && pix[1] < 150 && pix[2] < 150); // Siyah kare kontrolü
    }

    function openBuildMenu() {
        if (Date.now() < buildEndTime) return;
        document.getElementById('build-menu').style.display = 'block';
    }

    async function startBuild(typeLabel, finalIcon, duration) {
        // 1. Deniz Kontrolü
        if(checkIsSea(x, y)) {
            addNotification("⚠️ Denize inşaat yapamazsın!", "red");
            return;
        }

        // 2. Mesafe Kontrolü (Tam sayı kare farkı)
        const { data: list } = await supabaseClient.from('structures').select('x, y');
        const tooClose = list?.some(s => {
            const dx = Math.abs(Math.floor(s.x) - Math.floor(x));
            const dy = Math.abs(Math.floor(s.y) - Math.floor(y));
            return (dx === 0 && dy === 0) ? false : (dx < 5 && dy < 5); // 5x5 alan kontrolü
        });

        if(tooClose) {
            addNotification("⚠️ Çok Yakın! En az 5 kare uzağa yapmalısın.", "orange");
            return;
        }

        const bName = prompt("Yapı İsmi:");
        if(!bName) return;

        document.getElementById('build-menu').style.display = 'none';
        buildEndTime = Date.now() + (duration * 1000);

        // 3. YEREL GÖRÜNÜMÜ ANINDA OLUŞTUR (Vinç Görünsün Diye)
        createLocalVisual(x, y, '🏗️', bName);

        const saveStr = `${myName}||${myColor}||${bName}`;
        const { data } = await supabaseClient.from('structures').insert({
            owner_name: saveStr,
            type: '🏗️',
            x: Math.floor(x),
            y: Math.floor(y)
        }).select();

        if(data && data[0]) {
            addNotification(`🏗️ ${typeLabel} inşaatına başlandı...`, "cyan");
            
            setTimeout(async () => {
                await supabaseClient.from('structures').update({ type: finalIcon }).eq('id', data[0].id);
                addNotification(`✅ ${bName} tamamlandı!`, "#2ecc71");
                loadData(); // Sembolün değişmesi için veriyi tazele
            }, duration * 1000);
        }
    }

    function createLocalVisual(lx, ly, icon, title) {
        const mapDiv = document.getElementById('map');
        const b = document.createElement('div');
        b.className = 'building local-temp';
        b.style.left = (lx * SIZE) + "px";
        b.style.top = (ly * SIZE) + "px";
        b.innerHTML = `<span class="build-icon">${icon}</span><span class="build-tag" style="color:${myColor}; border-color:${myColor}">${myName}<br><b>${title}</b></span>`;
        mapDiv.appendChild(b);
    }

    function updateUnit() {
        const p = document.getElementById('player');
        p.style.left = (x * SIZE) + "px";
        p.style.top = (y * SIZE) + "px";
        
        const vp = document.getElementById('viewport');
        vp.scrollTo((x * SIZE) - (window.innerWidth / 2), (y * SIZE) - (window.innerHeight / 2));
    }

    document.getElementById('map').onclick = function(e) {
        if(e.target.id !== 'map-img') return;
        const tx = Math.floor(e.offsetX / SIZE);
        const ty = Math.floor(e.offsetY / SIZE);
        
        if(Math.abs(tx - x) + Math.abs(ty - y) === 1) {
            const cd = checkIsSea(x, y) ? 8000 : 4000;
            if(Date.now() - lastMoveTime < cd) return;
            x = tx; y = ty; lastMoveTime = Date.now();
            updateUnit();
        }
    };

    async function loadData() {
        const { data: dbStr } = await supabaseClient.from('structures').select('*');
        const mapDiv = document.getElementById('map');
        
        // Sadece kesinleşmiş yapıları temizle ve yeniden çiz
        mapDiv.querySelectorAll('.building').forEach(b => {
